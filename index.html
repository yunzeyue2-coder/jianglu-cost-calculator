<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>潜卤 · 酱卤老兵 · 酱卤机会研判</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px;max-width:480px;margin:0 auto}
.header{text-align:center;padding:24px 0 12px;border-bottom:2px solid #1a1a1a;margin-bottom:16px}
.header h1{font-size:24px;font-weight:700;letter-spacing:4px}
.header .sub{font-size:12px;color:#888;margin-top:2px}
.header .tagline{font-size:11px;color:#aaa;margin-top:4px}
.nav{display:flex;gap:6px;margin:12px 0;overflow-x:auto;padding-bottom:4px}
.nav-item{padding:7px 14px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;white-space:nowrap;transition:.15s}
.nav-item.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.layer{display:none}
.layer.active{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.card{background:#fff;border-radius:8px;padding:14px;cursor:pointer;border:1px solid #eee;transition:.12s}
.card:hover{border-color:#1a1a1a;transform:translateY(-1px)}
.card .emoji{font-size:22px;margin-bottom:4px}
.card .name{font-size:13px;font-weight:500}
.card .count{font-size:11px;color:#999;margin-top:2px}
.sub-card{background:#fff;border-radius:8px;padding:11px 14px;margin:5px 0;display:flex;justify-content:space-between;align-items:center;border:1px solid #eee;cursor:pointer;transition:.12s}
.sub-card:hover{border-color:#1a1a1a}
.sub-card .name{font-size:13px}
.sub-card .arrow{color:#aaa;font-size:13px}
.bread{font-size:11px;color:#999;padding:6px 0;margin-bottom:6px;border-bottom:1px solid #eee}
.bread span{cursor:pointer}
.bread span:hover{color:#1a1a1a}
.btn-back{display:inline-block;padding:5px 10px;font-size:11px;color:#666;cursor:pointer;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;background:#fff}
.product-row{display:flex;flex-direction:column;gap:6px}
.prod-item{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #eee;cursor:pointer}
.prod-item .name{font-size:13px;font-weight:500}
.prod-item .meta{font-size:11px;color:#999;margin-top:2px}
.prod-item .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px}
.tag-green{background:#e8f5e9;color:#2e7d32}
.price-box{background:#fafaf5;border-radius:8px;padding:14px;margin:12px 0;border:1px solid #e8e8e0}
.price-box .amount{font-size:20px;font-weight:700}
.price-box .note{font-size:11px;color:#888;margin-top:4px}
.btn-pay{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;transition:.12s}
.proc-step{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0eb}
.proc-step:last-child{border:none}
.proc-num{width:22px;height:22px;background:#1a1a1a;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.proc-text{font-size:12px;line-height:1.5}
.proc-detail{font-size:11px;color:#666;margin-top:2px}
.locked{color:#ccc;font-size:11px}
.section-title{font-size:14px;font-weight:600;margin:16px 0 10px;padding-left:8px;border-left:3px solid #1a1a1a}
</style>
</head>
<body>

<div class="header">
  <h1>潜 卤</h1>
  <div class="sub">酱卤老兵 · 酱卤机会研判</div>
  <div class="tagline">看见水面之下的力量</div>
</div>

<div class="nav" id="navBar"></div>

<div id="contentArea"></div>

<script>
const DATA = {
  raw: {
    name:'鲜卤·冷藏', emoji:'🥩',
    items: {
      chicken:{name:'鸡类',emoji:'🐔',forms:{
        whole:{name:'整鸡',products:[
          {id:'tea-chicken',name:'茶香鸡',desc:'鲜卤·鸡类·整鸡',price:'¥199',
           process:['原料验收（三黄鸡，合格供应商）','领料拆包（核对品项和数量）','解冻清洗（冷水/≤50℃温水）','腌制（0-4℃，12h；可选干腌/炒盐腌）','油炸（170℃入锅，三黄鸡需炸）','卤制（料包A+B+铁观音茶梗，小火保皮）','关火焖汁（熄火30min）','摊晾（0-10℃，中心≤15℃）','包装（真空封口）','金探→入库（0-4℃冷藏）'],
           detail:['原料：三黄鸡白条 ¥155-185/件（8-10只）','出成率：70-72%','单只净重：450-500g','执行标准：GB/T 23586','老母鸡版本：不油炸，卤制时间+20min']},
          {id:'baiwei-chicken',name:'百味鸡',desc:'鲜卤·鸡类·整鸡',price:'¥199',process:['待滄林填充'],detail:[]},
          {id:'tengjiao-chicken',name:'藤椒鸡',desc:'鲜卤·鸡类·整鸡',price:'¥199',process:['待滄林填充'],detail:[]}
        ]},
        parts:{name:'鸡副',products:[
          {id:'fengzhua',name:'泡椒凤爪',desc:'鲜卤·鸡类·鸡副',price:'¥159',process:['待填充'],detail:[]}
        ]}
      }},
      duck:{name:'鸭类',emoji:'🦆',forms:{whole:{name:'整鸭',products:[]},parts:{name:'鸭副',products:[]}}},
      pig:{name:'猪类',emoji:'🐖',forms:{whole:{name:'整猪',products:[]},parts:{name:'分割品',products:[]}}},
      cow:{name:'牛类',emoji:'🐄',forms:{whole:{name:'整牛',products:[]},parts:{name:'分割品',products:[]}}}
    }
  },
  sauce:{name:'酱卤',emoji:'🔥',items:{}},
  snack:{name:'休闲卤味',emoji:'🧂',items:{}},
  season:{name:'调理·调味',emoji:'🧪',items:{}}
};

const state = { chapter:'raw', type:'', form:'', product:null, paid:false };

function render(){
  const navBar = document.getElementById('navBar');
  navBar.innerHTML = Object.entries(DATA).map(([k,v]) =>
    `<div class="nav-item${state.chapter===k?' active':''}" onclick="switchChapter('${k}')">${v.emoji} ${v.name}</div>`
  ).join('');
  showCategory();
}

function switchChapter(k){ state.chapter=k; state.type=''; state.form=''; state.product=null;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');
  showCategory();
}

function showCategory(){
  const ch = DATA[state.chapter];
  let html = `<div class="section-title">选择原料</div><div class="grid-2">`;
  Object.entries(ch.items).forEach(([k,v]) => {
    let cnt = 0; Object.values(v.forms).forEach(f=>cnt+=f.products.length);
    html += `<div class="card" onclick="showForm('${k}')"><div class="emoji">${v.emoji}</div><div class="name">${v.name}</div><div class="count">${cnt}品</div></div>`;
  });
  html += `</div>`;
  document.getElementById('contentArea').innerHTML = html;
}

function showForm(type){
  state.type = type; state.form = '';
  const ch = DATA[state.chapter]; const item = ch.items[type];
  let html = `<div class="bread"><span onclick="showCategory()">${ch.name}</span> › ${item.name}</div>
    <div class="section-title">选择形态</div>`;
  Object.entries(item.forms).forEach(([k,v]) => {
    html += `<div class="sub-card" onclick="showProducts('${type}','${k}')">
      <span class="name">${v.name}</span><span class="arrow">${v.products.length}品 ›</span></div>`;
  });
  document.getElementById('contentArea').innerHTML = html;
}

function showProducts(type, form){
  state.type=type; state.form=form;
  const ch=DATA[state.chapter]; const f=ch.items[type].forms[form];
  let html = `<div class="bread"><span onclick="showCategory()">${ch.name}</span> › <span onclick="showForm('${type}')">${ch.items[type].name}</span> › ${f.name}</div>
    <div class="section-title">产品列表</div><div class="product-row">`;
  f.products.forEach(p => {
    html += `<div class="prod-item" onclick="showDetail('${type}','${form}','${p.id}')">
      <div class="name">${p.name} <span class="tag tag-green">${p.desc}</span></div>
      <div class="meta">${p.price}</div></div>`;
  });
  html += `</div>`;
  document.getElementById('contentArea').innerHTML = html;
}

function showDetail(type, form, id){
  const f=DATA[state.chapter].items[type].forms[form];
  const p = f.products.find(x=>x.id===id);
  if(!p) return;
  let html = `<div class="btn-back" onclick="showProducts('${type}','${form}')">← 返回</div>
    <h2 style="font-size:17px;margin:0 0 2px">${p.name}</h2>
    <div style="font-size:11px;color:#888;margin-bottom:10px">${p.desc}</div>
    <div class="price-box">
      <div class="amount">${state.paid ? '✅ 已解锁' : p.price}</div>
      <div class="note">${state.paid ? '完整工艺方案已全部展开' : '含完整配方参数+CCP点+品控标准'}</div>
      <button class="btn-pay" onclick="unlock()">${state.paid ? '已支付' : '支付 ¥'+p.price.replace('¥','')}</button>
    </div>
    <div class="section-title">工艺流程</div>`;
  p.process.forEach((step,i)=>{
    html += `<div class="proc-step"><div class="proc-num">${i+1}</div><div>
      <div class="proc-text">${step.split('（')[0]}</div>
      ${state.paid ? '<div class="proc-detail">'+step+'</div>' : '<div class="locked">🔒 支付后展开</div>'}
    </div></div>`;
  });
  if(state.paid && p.detail.length){
    html += `<div class="section-title">关键参数</div>`;
    p.detail.forEach(d=>{html+=`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid #f0f0eb">${d}</div>`;});
  }
  document.getElementById('contentArea').innerHTML = html;
}

function unlock(){ state.paid=true;
  let ch=state.chapter, t=state.type, f=state.form;
  const item=DATA[ch].items[t].forms[f].products;
  if(item.length) showDetail(t,f,item[0].id);
}

render();
</script>
</body>
</html>
