/* Splash loading */

.sb{display:flex;gap:8px;padding:0 0 10px}

.rank-bar{background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:10px;border:1px solid #eee}
.rank-title{font-size:13px;font-weight:700;color:#C0392B;margin-bottom:8px}
.rank-list{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.rank-item{background:#f9f5ef;padding:5px 12px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;color:#555;flex-shrink:0;border:1px solid #f0e8de;transition:all 0.15s}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:80px}

.card .img img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:6px;left:6px;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.badge-new{background:#E8652D;color:#fff}

.card .meta{font-size:12px;color:#999;display:flex;gap:8px;align-items:center;margin-top:4px}
.card .meta .tag{background:#f0ece6;color:#C0392B;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}

  if(cd.替代) h += '<div class="d-sec"><div class="d-h">替代方案</div><div class="d-p">'+cd.替代+'</div></div>'
  if(cd.变体) h += '<div class="d-sec"><div class="d-h">变体推荐</div><div class="d-p">'+cd.变体+'</div></div>'
  if(cd.常见问题) {

  }

  if(cd.仪式感) {

    cd.仪式感.forEach(function(s){ h += '<span class="bullet">▸</span> '+s+'\n' })
    h += '</div></div>'
  }
  if(cd.审核) h += '<div class="d-sec" style="border-left-color:#999;background:#f9f7f4"><div class="d-h" style="color:#999">🔍 审核</div><div class="d-p" style="font-size:12px;color:#999">'+cd.审核+'</div></div>'
  h += '</div>'
  h += '<div class="chart-area"><div class="title">📊 毛利趋势图</div><div class="chart-placeholder">即将上线，敬请期待</div></div>'
  h += '<div class="msg-area"><div class="title">💬 留下你的问题或反馈</div><input class="msg-input" placeholder="写点什么…" maxlength="200"><br><button class="msg-btn" onclick="alert('反馈已提交，感谢！')">发送</button></div>'
  h += '<div style="text-align:center;padding:0 12px 24px"><button class="sub-btn" onclick="sub()">订阅解锁完整版</button></div>
  <div style="padding:0 12px 30px;text-align:center;font-size:9px;color:#ccc;line-height:1.5">本库配方由滄林·小将团队收集验证 · 按方操作小白不输老师傅<br>部分图片由AI生成 · 配方数据仅供参考请以实测为准</div>'
  document.getElementById('db').innerHTML = h
  d.classList.add('active'); document.body.style.overflow='hidden'
}
