<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>咔库 · 产品卡</title>
<link rel="manifest" href="/jianglu-cost-calculator/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="咔库">
<link rel="apple-touch-icon" href="/jianglu-cost-calculator/images/kaku-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",sans-serif;background:#f8f7f4;color:#1a1a1a;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:420px;margin:0 auto;padding:0 12px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;position:sticky;top:0;background:#f8f7f4;z-index:10}
.hd h1{font-size:18px;font-weight:600;letter-spacing:2px}
.hd-r{display:flex;gap:8px;align-items:center}
.hd-r .btn{font-size:11px;padding:5px 10px;border:1px solid #e0ddd8;border-radius:14px;cursor:pointer;background:#fff;transition:.15s;font-family:inherit;color:#666}
.hd-r .btn:hover{border-color:#1a1a1a;color:#1a1a1a}
.hd-r .user{font-size:11px;color:#999}

.login-page{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:0 20px}
.login-page.active{display:flex}
.login-logo{font-size:36px;margin-bottom:8px;opacity:.6}
.login-title{font-size:17px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:12px;color:#999;margin-bottom:24px;text-align:center}
.login-input{width:100%;padding:12px 14px;border:1px solid #e0ddd8;border-radius:8px;font-size:15px;outline:none;text-align:center;margin-bottom:12px;font-family:inherit;background:#fff}
.login-input:focus{border-color:#1a1a1a}
.login-btn{width:100%;padding:13px;border:none;border-radius:8px;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#333}
.login-note{font-size:10px;color:#bbb;margin-top:12px;text-align:center;line-height:1.6}
.login-note a{color:#999}

.sb{display:flex;gap:8px;padding:8px 0 12px}
.sb input{flex:1;padding:10px 14px;border:1px solid #e0ddd8;border-radius:20px;font-size:14px;outline:none;background:#fff;transition:border .2s;font-family:inherit}
.sb input:focus{border-color:#1a1a1a}
.sb input::placeholder{color:#bbb}
.sbtn{padding:10px 16px;border:none;border-radius:20px;background:#1a1a1a;color:#fff;font-size:13px;cursor:pointer;font-family:inherit}

.chips{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border:1px solid #e0ddd8;border-radius:16px;font-size:12px;white-space:nowrap;cursor:pointer;background:#fff;transition:.15s;flex-shrink:0;color:#666}
.chip:hover{border-color:#1a1a1a;color:#1a1a1a}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}


.grid{display:none;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:80px}
.grid.active{display:grid}
.card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #f0eee8}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.card .img{width:100%;aspect-ratio:16/10;background:#f0eee8;display:flex;align-items:center;justify-content:center;font-size:28px;color:#ccc;position:relative;overflow:hidden}
.card .img img{width:100%;height:100%;object-fit:cover}
.card .badge{position:absolute;top:6px;left:6px;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500}
.badge-new{background:#52c41a;color:#fff}
.badge-fire{background:#ff6b00;color:#fff}
.card .body{padding:10px}
.card .name{font-size:13px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .meta{font-size:11px;color:#999;display:flex;gap:6px;align-items:center}
.card .meta .tag{background:#f5f3ef;padding:1px 6px;border-radius:3px;font-size:10px}
.sub-banner{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0eee8;padding:12px 16px;max-width:420px;margin:0 auto;display:flex;align-items:center;gap:12px;z-index:100}
.sub-banner .text{flex:1;font-size:12px;color:#666}
.sub-banner .text strong{color:#1a1a1a;font-weight:600}
.sub-btn{padding:10px 24px;background:#1a1a1a;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.sub-btn:hover{background:#333}
.detail{display:none;padding:0 0 100px}
.detail.active{display:block}
.d-back{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#666;cursor:pointer;padding:12px 0 8px}
.d-img{width:100%;aspect-ratio:16/10;background:#f0eee8;border-radius:10px;overflow:hidden;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#ccc}
.d-img img{width:100%;height:100%;object-fit:cover}
.d-title{font-size:18px;font-weight:600;margin-bottom:2px}
.d-tags{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.d-tags span{font-size:11px;background:#f5f3ef;padding:2px 8px;border-radius:4px;color:#666}
.d-section{margin-bottom:14px}
.d-h{font-size:12px;font-weight:600;margin-bottom:6px;color:#888;letter-spacing:1px}
.d-p{font-size:13px;color:#444;line-height:1.7}
.d-list{list-style:none;padding:0}
.d-list li{font-size:13px;color:#444;padding:5px 0;border-bottom:1px solid #f0eee8;display:flex;gap:8px}
.d-list li::before{content:'·';color:#ccc}
.d-locked{text-align:center;padding:30px 0;color:#999;font-size:13px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal.active{display:flex}
.modal-inner{background:#fff;border-radius:16px 16px 0 0;padding:24px 16px 32px;max-width:420px;width:100%}
.modal-inner h2{font-size:16px;font-weight:600;margin-bottom:4px}
.modal-inner p{font-size:12px;color:#999;margin-bottom:20px}
.plan{display:flex;gap:8px;margin-bottom:14px}
.plan-item{flex:1;border:1px solid #e0ddd8;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:.15s}
.plan-item:hover{border-color:#1a1a1a;plan-item.active{border-color:#1a1a1a;background:#fafaf8}
.plan-item .p1{font-size:12px;color:#666;margin-bottom:4px}
.plan-item .p2{font-size:18px;font-weight:600}
.plan-item .p3{font-size:11px;color:#999;margin-top:2px}
.pay-btn{width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.pay-btn:hover{background:#333}
.modal-close{text-align:center;padding:12px 0 0;font-size:12px;color:#999;cursor:pointer}
</style>
</head>
<body>

<div class="wrap">

<!-- login page -->
<div class="login-page active" id="loginPage">
  <div class="login-logo">📇</div>
  <div class="login-title">咔库</div>
  <div class="login-sub">输入手机号即可体验 · 无需注册</div>
  <input class="login-input" id="phoneInput" placeholder="手机号" type="tel" autocomplete="off">
  <div class="login-btn" onclick="doLogin()">进入咔库</div>
  <div class="login-note">当前为免费体验阶段<br>已有账号？<a href="#" onclick="showLogin()">换个号码登录</a></div>
</div>

<!-- app -->
<div id="appArea" style="display:none">
<div class="hd">
  <h1>咔库</h1>
  <div class="hd-r">
    <span id="userDisplay" class="user"></span>
    <span class="btn" onclick="logout()">退出</span>
  </div>
</div>

<div class="sb" id="searchBar">
  <input id="searchInput" placeholder="搜产品名/品类" onkeydown="if(event.key=='Enter')doSearch()" autocomplete="off">
  <div class="sbtn" onclick="doSearch()">搜</div>
</div>

<div class="chips" id="chips"></div>
<div class="grid active" id="grid"></div>

<div class="sub-banner">
  <div class="text">已有 <strong id="cardCount">0</strong> 张产品卡 · 免费体验中</div>
</div>

<div class="detail" id="detailPage">
  <div class="d-back" onclick="closeDetail()">← 返回</div>
  <div class="d-img" id="dImg">🍦</div>
  <div class="d-title" id="dTitle"></div>
  <div class="d-tags" id="dTags"></div>
  <div id="dBody"></div>
  <div style="font-size:10px;color:#ccc;margin-top:20px;padding-top:12px;border-top:1px solid #f0eee8;line-height:1.6">
    免责声明：原料/人工/零售价因地区和时间存在差异，本卡仅供参考。请实地考察比对后再投入。
  </div>
</div>

<div class="modal" id="subModal">
  <div class="modal-inner">
    <h2>订阅咔库</h2>
    <p>解锁全部产品卡，每日更新</p>
    <div class="plan">
      <div class="plan-item active" onclick="selectPlan(this,'monthly')">
        <div class="p1">月度</div><div class="p2">¥19.9</div><div class="p3">续订自动扣</div>
      </div>
      <div class="plan-item" onclick="selectPlan(this,'yearly')">
        <div class="p1">年度</div><div class="p2">¥199</div><div class="p3">相当于¥16.6/月</div>
      </div>
      <div class="plan-item" onclick="selectPlan(this,'lifetime')">
        <div class="p1">永久</div><div class="p2">¥499</div><div class="p3">一次付款终身用</div>
      </div>
    </div>
    <div class="pay-btn" onclick="alert('支付即将开通，敬请期待')">立即订阅</div>
    <div class="modal-close" onclick="closeSub()">稍后再说</div>
  </div>
</div>
</div>

</div>

<script>
const IMG_BASE = 'https://yunzeyue2-coder.github.io/jianglu-cost-calculator/images/'
const IMG_BASE = 'https://yunzeyue2-coder.github.io/jianglu-cost-calculator/images/'
const allCards = [
  {id:'CD-001',name:'脆皮冰淇淋块',cat:'冷饮',tag:'新',img:IMG_BASE+'cd001.jpg',scene:'夜市/学校',margin:'65%'},
  {id:'TL-001',name:'商用万能脆皮裹粉',cat:'调味料',tag:'新',img:IMG_BASE+'tl001.jpg',scene:'炸串/炸鸡',margin:'80%'},
]
let curCat = '全部', currentCard = null

// Login
function doLogin(){
  const phone = document.getElementById('phoneInput').value.trim()
  if(!phone || phone.length < 5) return
  localStorage.setItem('kaku_user', phone)
  // Report new user
  try{
    fetch('https://api.telegram.org/bot8119539449:AAE2_vjGnFDnHZQvGQcxfKav1nHnlQYq5J8/sendMessage', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:'8305915519', text:'📱 新用户: '+phone+' | '+new Date().toLocaleString('zh-CN')})
    })
  }catch(e){}
  showApp(phone)
}
function showLogin(){
  document.getElementById('phoneInput').value = ''
  document.getElementById('phoneInput').focus()
}
function logout(){
  const phone = prompt('输入原手机号可重新登录')
  if(phone) {localStorage.setItem('kaku_user',phone); showApp(phone)}
}

function showApp(phone){
  document.getElementById('loginPage').classList.remove('active')
  document.getElementById('loginPage').style.display = 'none'
  document.getElementById('appArea').style.display = 'block'
  document.getElementById('userDisplay').textContent = phone.slice(0,3)+'****'+phone.slice(-4)
  init()
}

// Auto-login check
(function(){
  const saved = localStorage.getItem('kaku_user')
  if(saved && saved.length > 5){
    document.getElementById('loginPage').classList.remove('active')
    document.getElementById('loginPage').style.display = 'none'
    document.getElementById('appArea').style.display = 'block'
    document.getElementById('userDisplay').textContent = saved.slice(0,3)+'****'+saved.slice(-4)
    init()
  }
})()

const CATS = ['全部','🔥 火爆','🆕 新卡','酱卤','冷饮','烘焙','小吃','调味料']

function init(){
  document.getElementById('cardCount').textContent = allCards.length
  renderChips(); renderGrid()
}

function renderChips(){
  document.getElementById('chips').innerHTML = CATS.map(c => 
    `<div class="chip${c===curCat?' active':''}${c.includes('🔥')?' fire':''}${c.includes('🆕')?' new':''}" onclick="filter('${c}')">${c}</div>`
  ).join('')
}

function filter(cat){curCat=cat;renderChips();renderGrid()}

function renderGrid(){
  let list = allCards
  if(curCat==='🔥 火爆') list=allCards.filter(c=>c.tag==='火')
  else if(curCat==='🆕 新卡') list=allCards.filter(c=>c.tag==='新')
  else if(curCat!=='全部') list=allCards.filter(c=>c.cat===curCat)

  const el = document.getElementById('grid')
  if(!list.length){el.innerHTML='<div style="padding:60px 20px;text-align:center;color:#ccc;grid-column:1/-1">暂无产品卡</div>';return}
  el.innerHTML = list.map(c=>`
    <div class="card" onclick="openDetail('${c.id}')">
      <div class="img">${c.img.startsWith('http')?'<img src="'+c.img+'">':c.img}${c.tag==='新'?'<span class="badge badge-new">新</span>':''}${c.tag==='火'?'<span class="badge badge-fire">🔥</span>':''}</div>
      <div class="body"><div class="name">${c.name}</div><div class="meta"><span class="tag">${c.cat}</span><span>毛利${c.margin}</span></div></div>
    </div>`
  ).join('')
  el.closest('.grid').classList.add('active')
}

function doSearch(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase()
  if(!q) return renderGrid()
  const list = allCards.filter(c=>c.name.includes(q)||c.cat.includes(q))
  const el = document.getElementById('grid')
  if(!list.length){el.innerHTML='<div style="padding:60px 20px;text-align:center;color:#ccc;grid-column:1/-1">未找到"'+q+'"</div>';return}
  el.innerHTML = list.map(c=>`<div class="card" onclick="openDetail('${c.id}')"><div class="img">${c.img.startsWith('http')?'<img src="'+c.img+'">':c.img}</div><div class="body"><div class="name">${c.name}</div><div class="meta"><span class="tag">${c.cat}</span><span>毛利${c.margin}</span></div></div></div>`).join('')
}

function openDetail(id){
  currentCard = allCards.find(c=>c.id===id)
  if(!currentCard) return
  document.querySelector('.grid').classList.remove('active')
  document.getElementById('detailPage').classList.add('active')
  document.getElementById('dImg').innerHTML = currentCard.img.startsWith('http')?'<img src="'+currentCard.img+'">':currentCard.img
  document.getElementById('dTitle').textContent = currentCard.name
  document.getElementById('dTags').innerHTML = `<span>${currentCard.cat}</span><span>毛利${currentCard.margin}</span><span>${currentCard.scene}</span>`
  document.getElementById('dBody').innerHTML = `<div class="d-locked"><div>🔒 完整配方+SOP已就位</div><div style="font-size:11px;color:#ccc;margin:8px 0">订阅后自动解锁全部内容</div><div class="sub-btn" onclick="openSub()">开通订阅</div></div>`
}
function closeDetail(){document.getElementById('detailPage').classList.remove('active');document.querySelector('.grid').classList.add('active')}
function openSub(){document.getElementById('subModal').classList.add('active')}
function closeSub(){document.getElementById('subModal').classList.remove('active')}
function selectPlan(el,p){document.querySelectorAll('.plan-item').forEach(e=>e.classList.remove('active'));el.classList.add('active')}
</script>

<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/jianglu-cost-calculator/sw.js").catch(()=>{})}</script>
</body>
</html>
