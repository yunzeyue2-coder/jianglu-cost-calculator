<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f8f7f4;color:#1a1a1a}
.wrap{max-width:420px;margin:0 auto;padding:0 12px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 0;position:sticky;top:0;background:#f8f7f4;z-index:10}
.hd h1{font-size:17px;font-weight:600;letter-spacing:2px}
.sb{display:flex;gap:8px;padding:0 0 10px}
.sb input{flex:1;padding:9px 14px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.sb input:focus{border-color:#1a1a1a}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border:1px solid #ddd;border-radius:14px;font-size:12px;white-space:nowrap;cursor:pointer;background:#fff;flex-shrink:0;color:#666}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:80px}
.card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #eee}
.card .img{width:100%;aspect-ratio:16/10;background:#eee;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.card .img img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:5px;left:5px;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.badge-new{background:#52c41a;color:#fff}
.card .body{padding:8px 10px}
.card .name{font-size:13px;font-weight:500}
.card .meta{font-size:11px;color:#999;display:flex;gap:6px;align-items:center;margin-top:2px}
.card .meta .tag{background:#f5f3ef;padding:1px 6px;border-radius:3px;font-size:10px}

/* detail overlaid */
.detail{display:none;position:fixed;inset:0;background:#fff;z-index:50;overflow-y:auto;padding:0 12px 40px;max-width:420px;margin:0 auto}
.detail.active{display:block}
.d-top{display:flex;align-items:center;gap:8px;padding:14px 0;border-bottom:1px solid #eee;margin-bottom:14px}
.d-back{font-size:20px;cursor:pointer;color:#666;line-height:1}
.d-title{font-size:16px;font-weight:500}
.d-img{width:100%;aspect-ratio:16/10;background:#eee;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px}
.d-img img{width:100%;height:100%;object-fit:cover}
.d-meta{font-size:12px;color:#999;margin-bottom:12px;display:flex;gap:10px}
.d-meta span{background:#f5f3ef;padding:2px 8px;border-radius:4px}
.d-sec{margin-bottom:14px}
.d-h{font-size:11px;font-weight:600;color:#888;letter-spacing:1px;margin-bottom:6px}
.d-p{font-size:13px;color:#444;line-height:1.6;white-space:pre-wrap}
table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
td{padding:4px 6px;border-bottom:1px solid #eee;color:#555}
td:first-child{color:#888;width:35%}
.d-locked{text-align:center;padding:30px 0;color:#999;font-size:13px}
.sub-btn{display:inline-block;padding:10px 28px;background:#1a1a1a;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;margin-top:8px}
.ftr{bottom:0;position:fixed;max-width:420px;width:calc(100% - 24px);background:#fff;border-top:1px solid #eee;padding:10px 12px;text-align:center;font-size:11px;color:#999}
</style>
</head>

末异香与表层的油脂均匀混合后再行浇淋"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-008": {"配方": [["无核阿胶枣", "150g", "-", "泡软打碎，甜润主体"], ["开水", "500ml", "-", "泡枣介质"], ["红枣果汁伴侣", "80ml", "-", "风味调和"], ["优果粉", "18g (1.5勺)", "-", "复合底味"], ["奶粉", "6g (1/2勺)", "-", "微调奶香，丝滑口感"], ["开水", "补至1250ml", "-", "二次打浆调稀"]], "SOP": ["取无核阿胶枣150g，投入500ml开水中浸泡2分钟充分吸水软化", "开启榨汁机高速榨20秒打碎枣泥", "加入红枣果汁伴侣80ml+优果粉1.5勺(18g)+奶粉半勺(6g)", "补开水至1250ml，二次高速榨20秒", "细密网过滤，用刮刀轻压滤网使细腻果肉与汁水融合", "保温桶储存，随杯出品"], "毛利": "成本¥2.10/杯(350ml) → 零售¥9.00 → 毛利76.7%", "设备": "商用高功率静音破壁机¥800-1200 / 保温储液桶¥250-400 / 不锈钢细密过滤网¥80-120, 共计约¥1,650", "替代": "无核阿胶枣→普通去核红枣+少量红糖(缺阿胶药香) / 红枣果汁伴侣→自制红枣浓缩汁", "变体": "枸杞红枣汁/桂圆红枣汁/红枣姜茶", "常见问题": "Q:有渣感口感粗糙? A:浸泡时间不够,枣未充分软化,需泡足2分钟再打", "建议图片描述": "A steaming cup of rich, smooth light-brown jujube juice in a stylish minimalist paper cup, set on a dark rustic stone counter. A small wooden bowl containing a few premium pitless red dates and a faint splash of fresh milk on the side. Beautiful soft overhead backlighting catching the natural steam rising from the cup, shallow depth of field, professional hot beverage photography, no text, no recipe.", "美食故事": "冬日深夜的养生推车前，滚烫的雾气不断从盖缝中溢出。加班到凌晨的年轻女孩在摊位前驻足，哈着气点了一杯热枣汁。\n\n刚破壁过滤好的阿胶红枣汁呈现出温暖的浅红褐色，倒入纸杯时浓稠高挂。微弱的奶香刚好中和了红枣过于直白的甜腻，入口极其丝滑软糯，一股带着阿胶和红枣特殊甜润的暖流顺着食道一路滑进胃里，驱散了冬夜通宵积攒的所有寒意。", "仪式感": ["过滤时用刮刀轻压滤网，使细腻的枣泥果肉与汁水完全融合，只留下粗糙的皮渣", "双手捧着刚出锅的纸杯，深吸一口扑面而来的浓郁枣香与微弱奶香，再趁热小口饮用"], "场景标签": ["佐餐", "零食", "夜宵"]}, "CD-009": {"配方": [["炒熟去皮花生仁", "100g", "-", "油脂醇香核心"], ["全麦复合粉", "30g (2大勺)", "-", "糊化增稠，谷物甜味"], ["麦香果汁伴侣", "80ml", "-", "风味调和"], ["奶粉", "半勺", "-", "奶香顺滑"], ["优果粉", "1勺", "-", "复合底味"], ["开水(90℃+)", "至1250ml", "-", "一次700ml+二次补足"]], "SOP": ["炒熟去皮花生仁100g投入榨汁机", "加全麦复合粉30g，冲入90℃以上开水至700ml", "高速榨汁，利用高温使全麦粉充分糊化增稠", "加麦香果汁伴侣80ml+奶粉半勺+优果粉1勺", "补开水至1250ml，二次高速榨匀", "无需过滤，保留全麦膳食纤维，保温桶储存"], "毛利": "成本¥1.60/杯(350ml) → 零售¥7.00 → 毛利77.1%", "设备": "商用高功率破壁机¥800-1200 / 大容量开水器¥300-500 / 全封闭保温桶¥250-400, 共计约¥1,800", "替代": "炒熟花生→生花生+烤箱自炒(需控制火候) / 全麦复合粉→燕麦粉+麦麸(口感略粗)", "变体": "花生核桃汁/黑芝麻全麦汁/红豆薏米汁", "常见问题": "Q:口感稀薄水感重? A:全麦糊化不够,必须用90℃以上开水或增加全麦粉用量", "建议图片描述": "A warm steaming glass mug filled with thick, creamy beige peanut whole wheat juice, placed on a light-colored wooden table. A small rustic ceramic bowl next to it containing a handful of roasted, peeled peanuts and some whole wheat grains. Soft morning window light illuminating the natural steam rising, cozy and authentic breakfast atmosphere, shallow depth of field, high-resolution beverage photography, no text, no recipe.", "美食故事": "清晨六点的大学城后街，早餐摊位的蒸屉正呼呼冒着白烟。赶早八课程的学生揉着眼睛在摊位前驻足，喊道：\"老板，拿杯热花生全麦，打包带走！\"\n\n刚打好的花生全麦汁呈现出温暖的乳麦黄色，浓稠度刚好挂杯。炒花生的油脂香气在90度以上热水的冲激下被成倍放大，混合着全麦糊化后特有的天然谷物甜味。猛吸一口，温热的浆液滑过喉咙，带着微微的颗粒感与醇厚奶香，既解了口渴又填补了空荡的胃。", "仪式感": ["冲入90度以上开水时动作要快，借助高温在破壁前瞬间锁住全麦粉的淀粉结构", "封盖前摇晃杯身，让表面自然形成的细腻谷物泡沫与空气充分接触，使香气更易散发"], "场景标签": ["佐餐", "零食", "夜宵"]}, "CD-010": {"配方": [["鸡腿肉", "500g", "-", "剁块，主料"], ["秘制酱料", "70g", "-", "腌制5h+焖烧，核心调味"], ["蚝油", "450g(批次)", "-", "酱底基础鲜味"], ["酱油", "300g(批次)", "-", "咸鲜底色"], ["黄豆酱", "200g(批次)", "-", "复合酱香"], ["生抽", "150g(批次)", "-", "增鲜调色"], ["红烧汁", "100g(批次)", "-", "深化酱色"], ["白糖", "50g(批次)", "-", "回甘调和"], ["鲍鱼汁", "50g(批次)", "-", "海鲜复合鲜"], ["鸡汁鸡精", "35g(批次)", "-", "提鲜"], ["五香粉", "30g(批次)", "-", "复合香底"], ["鲜香菇", "50g", "-", "增鲜吸汁"], ["青椒", "25g", "-", "清香配色"], ["鲜汤", "250g", "-", "高压介质"], ["生姜", "适量", "-", "去腥增香"]], "SOP": ["熬酱：蚝油450g+酱油300g+黄豆酱200g+生抽150g+红烧汁100g+白糖50g+鲍鱼汁50g+鸡汁鸡精35g+五香粉30g混合熬5分钟成秘制酱", "鸡腿肉500g剁块，加70g酱料拌匀，冷藏腌制5小时", "出餐：鸡肉块+生姜+鲜汤250g入高压锅，上气压3分钟锁汁", "倒入砂锅，下鲜香菇50g烧开焖约3分钟", "投入青椒块25g，借着余热快速翻搅三次", "砂锅上桌，先吃肉后拌饭"], "毛利": "成本¥6.80/份(含鸡腿肉+香菇青椒+酱料) → 零售¥16.00 → 毛利57.5%", "设备": "商用双头高压锅¥800-1200 / 多头砂锅组合灶¥1200-1800 / 冷藏工作台¥800-1200, 共计约¥3,500", "替代": "鸡腿肉→鸡全腿或琵琶腿(需调整腌制时间) / 鲍鱼汁→干贝+蚝油(鲜度略降)", "变体": "麻辣黄焖鸡/蒜香黄焖鸡/菌菇黄焖鸡", "常见问题": "Q:鸡肉柴不嫩? A:腌制时间不够或高压压制过久,必须冷藏腌足5小时,上气后3分钟即止", "建议图片描述": "A classic Chinese Huangmen chicken stew served in a sizzling, authentic black clay pot. Large, juicy chunks of braised chicken thigh meat, plump shiitake mushrooms, and vibrant green bell pepper pieces are coated in a rich, glossy golden-brown savory gravy. Wisps of hot steam are naturally rising from the dish. Warm restaurant ambient lighting, extreme close-up shot focusing on the bubbling sauce texture, shallow depth of field, high-resolution food culinary photography, no text, no recipe.", "美食故事": "中午十二点的写字楼后巷，黄焖鸡小馆的油烟机轰轰作响。外卖员进进出出，店里坐满了刚打完卡的上班族，个个伸长脖子张望：\"老板，我的黄焖鸡加辣，多加点汤汁！\"\n\n单人份的小砂锅端上来时还在剧烈翻滚，浓稠的黄褐色酱汁将鸡腿肉、香菇片裹得严严实实。经过高压锅3分钟的压制，鸡腿肉饱含汤汁，用筷子轻轻一拨就骨肉分离；鲜香菇吸饱了蚝油和鲍鱼汁的复合鲜味，把滚烫的浓汁兜头浇在白米饭上，酱香伴着青椒的清香，几下就能扒光一整碗饭。", "仪式感": ["砂锅离火，借着余热投入鲜青椒块，用筷子快速翻搅三次，利用酱汁的高温瞬间激发出青椒的清爽香气", "上桌时砂锅滋滋作响、汤汁微沸，提醒食客\"先吃肉，后拌饭\""], "场景标签": ["佐餐", "夜宵"]}, "CD-011": {"配方": [["猪筒骨/脊骨", "500g(单份)", "-", "主料，酱卤熟制"], ["高汤", "60斤(批次)", "-", "卤水基底"], ["八角", "80g(批次)", "-", "君料，增香"], ["桂皮", "40g(批次)", "-", "复合香"], ["草蔻", "40g(批次)", "-", "去腥增香"], ["白蔻", "30g(批次)", "-", "清凉辛香"], ["小茴香", "40g(批次)", "-", "回香引子"], ["山奈", "35g(批次)", "-", "增香"], ["良姜", "20g(批次)", "-", "去腥"], ["草果去籽", "20g(批次)", "-", "去腥增香"], ["香叶", "25g(批次)", "-", "清香"], ["肉蔻", "15g(批次)", "-", "增香"], ["花椒", "10g(批次)", "-", "微麻去腥"], ["甘草", "10g(批次)", "-", "回甘调和"], ["白芷", "10g(批次)", "-", "去膻增香"], ["丁香", "10g(批次)", "-", "尖香点缀"], ["姜", "400g(批次)", "-", "炸香后入卤"], ["葱", "400g(批次)", "-", "炸香后入卤"], ["料酒", "1瓶(批次)", "-", "去腥"], ["盐", "500g(批次)", "-", "基咸"], ["生抽", "500g(批次)", "-", "咸鲜调色"], ["味精", "50g(批次)", "-", "提鲜"], ["鸡精", "50g(批次)", "-", "提鲜"], ["糖色", "100g(批次)", "-", "天然上色"], ["红曲米水", "350g(批次)", "-", "红润增色"]], "SOP": ["18味香料拍破，用水浸泡10分钟去燥，捞出装香料包", "不锈钢桶加高汤60斤，投入香料包", "姜400g+葱400g提前炸香，入桶", "加料酒1瓶+盐500g+生抽500g+味精50g+鸡精50g+糖色100g+红曲米水350g", "小火熬30分钟成基础酱大骨卤水", "大骨焯水去血沫，入卤水小火卤制至肉质酥烂", "上桌前用原桶卤汁将大骨重新烫透，至油亮挂汁即可出盘"], "毛利": "成本¥12.50/份(含大骨500g+卤水折旧) → 零售¥28.00 → 毛利55.4%", "设备": "100L不锈钢商用汤桶¥600-1000 / 大功率商用燃气灶¥1500-2500 / 展示保温柜¥500-800, 共计约¥2,600", "替代": "红曲米水→红曲粉+热水调开(色泽略暗) / 高汤→鸡骨架+猪骨熬制(成本更低)", "变体": "麻辣酱大骨/藤椒酱大骨/茶香酱大骨", "常见问题": "Q:卤水发苦? A:香料未浸泡去燥或丁香过量,必须泡10分钟再入卤", "建议图片描述": "A generous pile of traditional Chinese braised pork bones (Jiang Da Gu) piled high on a rustic ceramic platter, glistening with a rich, glossy dark-red savory sauce. Some bones show exposed rich marrow, and succulent meat is tenderly clinging to the bone structure. Plumes of hot, natural steam swirl around the dish. Warm, dramatic tavern ambient lighting, close-up shot focusing on the moist meat texture and reflective sauce, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "晚上八点的东北菜馆里，堂食的木桌上已经摞起了空啤酒瓶。老客们刚坐下，连菜单都不看，直接冲着柜台吆喝：\"老板，先整两斤酱大骨，多带点骨髓的！\"\n\n大瓷盘子一端上来，堆得像小山一样的大骨棒热气腾腾，红曲米水与糖色赋予了它天然的酱红光泽。用手直接抓起一根，饱含卤汁的瘦肉附着在骨节上，经过复合香料小火慢熬的卤水已经吃透进肉质纤维。撕咬下一大块瘦肉，酱香和脂香在口中爆发，最后拿根吸管往骨髓腔里一插，吸溜一口温热肥美的骨髓，这才是酱卤最扎实的江湖气。", "仪式感": ["卤好上桌前，必须用原桶卤汁将大骨重新烫透，让附着在骨头表面的油脂再次化开，达到\"油亮挂汁\"的视觉状态", "随盘附赠一次性手套与吸管，提醒食客先吃肉、后吸髓，完成酱卤大骨的终极解馋仪式"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-012": {"配方": [["五得利面包粉", "2.5斤(批次)", "-", "主面粉，筋度高外脆"], ["中筋面粉(富强粉)", "0.5斤(批次)", "-", "调和筋度"], ["温水", "4-4.5斤(批次)", "-", "调糊介质"], ["鸡蛋", "4-6个(批次)", "-", "蛋香+膨松"], ["调和油", "100g(批次)", "-", "润糊防粘"], ["安琪酵母", "30g(批次)", "-", "发酵膨松"], ["安琪泡打粉", "30g(批次)", "-", "辅助膨松"], ["吉士粉", "30g(批次)", "-", "奶香上色金黄"], ["王守义五香粉", "10-20g(批次)", "-", "五香基底"], ["食盐", "30g(批次)", "-", "基础咸味"], ["葵花红梅味精", "10-20g(批次)", "-", "提鲜"], ["肉馅/酱料", "适量", "-", "夹馅"]], "SOP": ["富强粉+调和油+鸡蛋+酵母+温水搅拌成基础糊", "加泡打粉+五香粉+食盐+味精+吉士粉，继续深层搅拌", "分批次加入面包粉2.5斤，高强度搅拌至无颗粒细腻糊状", "静置发酵：夏天30分钟 / 冬天1小时", "多孔汉堡机模具刷薄油，注入第一层面糊至听见\"嗞啦\"定型声", "加蛋+肉馅/酱料，再盖一层面糊封顶", "两面煎至焦糖金黄色，铲刀挑起出锅", "刷蒜蓉辣酱，纸袋打包"], "毛利": "成本¥1.50/个(含面糊+鸡蛋+肉馅) → 零售¥5.00 → 毛利70.0%", "设备": "多孔商用鸡蛋汉堡机(燃气/电动)¥400-800 / 不锈钢面糊漏斗¥30-60 / 专用铲刀¥20-40, 共计约¥1,300", "替代": "吉士粉→奶粉+姜黄粉(缺奶香上色) / 安琪酵母→老面种(需调整发酵时间)", "变体": "玉米鸡蛋汉堡/芝士鸡蛋汉堡/辣条鸡蛋汉堡", "常见问题": "Q:外皮不脆里面不松软? A:发酵时间不够或火力太小,夏天必须静置30分钟以上,中高火煎制", "建议图片描述": "A row of perfectly round, golden-brown Chinese egg burgers (Jidan Hanbao) cooking in a multi-hole commercial cast iron griddle. The crispy edges are slightly oily and bubbling, showing a fluffy, sponge-like soft texture on the inside where it cut open. Fresh green onions and hints of savory meat filling are visible. Warm, bright street food stall lighting, extreme close-up macro shot capturing the sizzling oily surface and golden texture, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "下午四点半的校门口，推车摊位前已经围满了解馋的学生和刚下班的年轻人。多孔汉堡机上的圆孔滋滋作响，面糊在热油的催化下迅速膨胀。\n\n两面煎至金黄的鸡蛋汉堡颤巍巍地被铲刀挑起。由于在面糊里加入了吉士粉与面包粉，外皮呈现出一种极其纯正的焦糖金黄色，边缘微微泛着酥脆的油光。一口咬下去，外壳发出细微的咔嚓声，里面却像海绵般吸足了蛋液与五香肉馅的咸香，松软多汁且完全不粘牙，带着温热的麦香，几口就能消灭一个。", "仪式感": ["模具刷上一层薄薄的调和油，注入第一层面糊时，必须听到清脆的\"嗞啦\"声，确保外皮迅速定型起酥", "出锅后用纸袋包裹，趁着热气在汉堡表面刷上一层特制蒜蓉辣酱，借着余热让酱香二次散发"], "场景标签": ["零食", "夜宵", "佐餐"]}, "CD-013": {"配方": [["鸡柳", "1000g(批次)", "-", "主料，切条锁水"], ["乐宅客腌料", "70g(批次)", "-", "入味锁水核心"], ["水", "500g(批次)", "-", "抓拌吸收介质"], ["玉米淀粉", "适量", "-", "裹粉第一层锁水"], ["面包糠", "足量", "-", "糠衣外壳，酥脆来源"], ["孜然粉/辣椒面", "适量", "-", "出锅复配调料"]], "SOP": ["鸡柳1000g+腌料70g+水500g，手抓搅拌5分钟至水分完全被肉质纤维吸收", "冰箱冷藏腌制8小时", "出摊前取出，加玉米淀粉抓拌均匀", "投入面包糠盆中手工抓拌，使表面完全码上糠衣，手掌轻压贴合", "顾客点单现场称重(约150g/份)入热油", "炸3分钟至金黄，捞出控油网用力颠勺三次沥油", "撒孜然粉+辣椒面，装袋出餐"], "毛利": "成本¥3.20/份(150g) → 零售¥10.00 → 毛利68.0%", "设备": "商用双通大功率电炸炉¥800-1200 / 不锈钢裹粉盆¥50-100 / 控油网勺¥30-60 / 台式电子秤¥80-150, 共计约¥1,500", "替代": "乐宅客腌料→奥尔良腌料+少量小苏打(风味不同) / 面包糠→薯片碎(酥脆度略降)", "变体": "麻辣鸡柳/椒盐鸡柳/柠檬鸡柳", "常见问题": "Q:炸出来外壳脱落? A:面包糠没压实,或下锅时裹粉未回潮定型,需手掌轻压再静置2分钟", "建议图片描述": "A close-up shot of golden-brown crispy fried chicken tenders (Ji Liu) piled high inside a retro paper snack bag, resting on a clean street food stall counter. A few pieces are perfectly broken in half, revealing the steaming, juicy white chicken meat inside under a super crunchy breadcrumb crust. Light sprinkles of chili powder and cumin are visible on the surface. Warm glowing night market ambient lighting, beautiful side backlight highlighting the crispy texture and rising steam, shallow depth of field, high-resolution action food photography, no text, no recipe.", "美食故事": "下午五点半的夜市刚刚开张，油锅在燃气灶的催化下升起微微的热浪。放学的小学生和下班的年轻人瞬间将小小的推车摊位围得水泄不通。\n\n称好重量的鸡柳被顺势滑入滚烫的油锅中，瞬间激起密集的清脆响声，面包糠在外油的逼迫下迅速定型变硬。只需3分钟，一锅金黄酥脆的鸡柳便破油而出，当头撒上一把孜然粉与辣椒面，装进纸袋里还带着烫手的温度。用竹签挑起一根塞进嘴里，咔嚓一声，外壳酥脆到掉渣，里面的肉质却因为吸足了水分而鲜嫩爆汁，这种纯粹的油炸香气是街头深夜最难抗拒的抚慰。", "仪式感": ["面包糠必须现卖现裹，用手掌轻压确保糠衣牢固贴合，防止入锅脱油", "炸好出锅时在控油网上用力颠勺三次，沥干多余油脂的同时让多重香料粉分布得更加均匀"], "场景标签": ["零食", "夜宵", "下酒"]}, "CD-014": {"配方": [["鸡胸肉", "500g(批次)", "-", "切2cm方正肉块"], ["新奥尔良腌料", "25g(批次)", "-", "核心风味甜辣"], ["牛肉粉", "2g(批次)", "-", "增鲜"], ["亚克西", "2g(批次)", "-", "复合香料"], ["白胡椒粉", "1g(批次)", "-", "去腥增香"], ["味精", "2g(批次)", "-", "提鲜"], ["绵白糖", "3g(批次)", "-", "回甘调和"], ["盐", "5g(批次)", "-", "基咸"], ["水", "120-150g(批次)", "-", "抓拌吸收介质"], ["裹粉(炸鸡起鳞粉)", "足量", "-", "两浸三裹起鳞工艺"], ["番茄酱/沙拉酱", "适量", "-", "出餐蘸料"]], "SOP": ["鸡胸肉切2cm方正肉块(500g)", "新奥尔良腌料25g+牛肉粉2g+亚克西2g+白胡椒粉1g+味精2g+绵白糖3g+盐5g+水120-150g混合调汁", "料汁倒入鸡胸肉块抓拌均匀，冷藏腌制8小时以上", "采用经典两浸三裹起鳞工艺裹粉：浸水→裹粉→再浸水→再裹粉→轻压起鳞", "入锅前轻抖去浮粉，投入热油炸3分钟至金黄鳞片爆裂", "控油网沥油，装入漏斗纸杯", "Z字形手法淋番茄酱/沙拉酱，出餐"], "毛利": "成本¥2.60/份(150g) → 零售¥9.00 → 毛利71.1%", "设备": "台式单缸电炸炉¥500-800 / 不锈钢起鳞筛网¥50-80 / 裹粉盆¥30-60 / 控油盆¥40-60, 共计约¥1,400", "替代": "新奥尔良腌料→奥尔良腌料+辣椒粉(风味略不同) / 两浸三裹→直接裹粉(无鳞片效果)", "变体": "辣味鸡米花/香草鸡米花/芝士鸡米花", "常见问题": "Q:鳞片炸不开? A:裹粉后没用手掌轻压起鳞或油温太低,需压到出现裂纹再入锅", "建议图片描述": "A pile of freshly fried, golden-brown popcorn chicken (Ji Mi Hua) with perfect crispy and spiky flaky skin textures, stacked inside a modern street food paper cone. One piece is gently cut open to reveal the steaming, juicy chicken meat inside. Light ambient lighting of a vibrant night market in the background with soft bokeh, beautiful warm side light emphasizing the intricate crunchy flakes and gentle rising steam, high-resolution close-up food photography, no text, no recipe.", "美食故事": "电影院散场后的街角小摊，橘黄色的灯光把初夏的夜烘托得格外热闹。刚看完深夜档的情侣手挽着手，在滋滋作响的油锅前停下缴械：\"老板，来份大份鸡米花，多加点番茄酱！\"\n\n2厘米见方的鸡肉块在特制裹粉的包裹下，入锅两分钟便撑起了金黄挺拔的爆裂鳞片。3分钟一到，控油网勺颠出清脆的声响，刚出锅的鸡米花外壳硬挺酥脆，里面的鸡胸肉因为吸足了奥尔良料汁而展现出完美的鲜嫩爆汁感。一根竹签扎下去，咔嚓一口，甜辣与肉香在舌尖炸开，这才是深夜压马路最完美的收尾。", "仪式感": ["严格遵循经典起鳞工艺进行揉压裹粉，入锅前轻抖去浮粉，确保炸出的每颗鸡米花都带有立体爆裂的酥脆鳞片", "装入漏斗型纸杯后，采取Z字形手法当面淋上沙拉酱或番茄酱，瞬间拉满街头小吃的视觉期待"], "场景标签": ["零食", "夜宵", "下酒"]}, "CD-015": {"配方": [["鸡脯肉", "80g", "-", "煮熟撕丝"], ["绿豆凉粉", "2卷", "-", "切条烫制，爽滑Q弹"], ["熟花生米", "30g", "-", "酥脆口感"], 玉米/虾仁等）"], "毛利": "成本¥1.80/份(基础蛋炒饭) → 零售¥8.00 → 毛利77.5%", "设备": "大火力商用单头炒灶¥800-1500 / 熟铁炒锅¥80-150 / 保温饭锅¥200-400 / 不锈钢调料盒¥50-80, 共计约¥1,800", "替代": "厨帮鸡粉→家乐鸡粉(鲜度接近) / 美味粉→鸡汁+干贝素(成本略高)", "变体": "榨菜肉丝炒饭/青椒肉丝炒饭/扬州炒饭/腊肉炒饭/鱿鱼炒饭", "常见问题": "Q:炒饭粘锅水塌? A:米饭太湿或火力不够,必须用隔夜饭或冷透的米饭,大火宽油猛炒", "建议图片描述": "A high-action shot of a professional chef tossing a wok of golden fried rice over a blazing hot commercial stove. Individual rice grains are visibly separate, glistening with soy sauce, scrambled egg, and chopped scallions. Intense steaming wok hei (breath of the wok) smoke rises dramatically, illuminated by the powerful gas flame. High contrast professional kitchen lighting, extreme close-up action shot, high-resolution culinary photography, no text, no recipe.", "美食故事": "晚上十点的十字路口，街头炒饭的摊位前永远围着夜班归来的年轻人。风机轰鸣，铁锅与铁铲高频碰撞，发出节奏感极强的哐哐声。\n\n一碗冷米饭下锅，在宽油旺火中被炒得粒粒分散。老板熟练地撒入3克核心调味粉，激发出纯正的咸鲜，随后沿锅边淋入蚝油与酱油。刹那间，一股浓烈的酱焦香（锅气）混合着米香扑面而来。盛在纸盒里的炒饭粒粒油亮发黄，包裹着细碎的蛋花，每一口都是极其标准的咸鲜适口、干爽筋道。", "仪式感": ["五味干粉必须单独在盆中干拌足3分钟，确保微量的美味粉和白糖均匀分布", "沿锅边淋入蚝油酱油的瞬间触发锅气，这是街头炒饭独有的焦香灵魂", "酱油与蚝油严禁直接淋在米饭上，必须在快出锅时沿滚烫的铁锅边缘泼入，利用高温瞬间气化激发出铁锅焦香"], "场景标签": ["佐餐", "夜宵"]}, "CD-020": {"配方": [["冰糖", "1斤(批次)", "-", "中火熬化，禁止搅拌"], ["清水", "1斤(批次)", "-", "熬糖基底"], ["新鲜金桔", "16颗(批次)", "-", "对半切开，充分释放果汁"], ["柠檬", "1个(批次)", "-", "洗净切薄片"], ["青柠(可选)", "16颗", "-", "替代金桔"]], "SOP": ["冰糖1斤+清水1斤入锅，中火熬化，期间禁止搅拌", "待冰糖完全熬化后彻底放凉备用", "新鲜金桔对半切开，柠檬洗净切均匀薄片", "放凉糖水中加入金桔16颗+柠檬片10片", "轻压金桔让果肉核心果汁与糖水融合", "入密封容器，冰箱冷藏腌制保存（可保存一周）", "出餐时依比例兑水或加冰块快速出品"], "毛利": "成本¥1.20/杯(400ml) → 零售¥6.00 → 毛利80.0%", "设备": "不锈钢冰糖熬煮锅¥100-200 / 商用冷藏柜¥800-1500 / 切片器¥20-40 / 果汁密封罐¥30-50, 共计约¥1,200", "替代": "冰糖→白砂糖(甜味不纯净) / 金桔→青柠(风味偏酸)", "变体": "蜂蜜柠檬糖水/百香果糖水/薄荷青柠糖水", "常见问题": "Q:糖水浑浊返砂? A:熬煮时搅拌了,中火熬化期间绝对不要搅动,自然融化最纯净", "建议图片描述": "A crystal-clear glass filled with a refreshing Chinese iced calamansi and lemon sweet water (Jinjv Ningmeng Tangshui). Plump green calamansi halves and vibrant yellow lemon slices are layers inside with lots of crushed ice cubes. Tiny condensation droplets are running down the outside of the glass. Bright summer daylight setting, close-up shot capturing the translucent texture of the liquid and fresh fruit rinds, soft bokeh background, high-resolution beverage photography, no text, no recipe.", "美食故事": "夏日正午的步行街，滚烫的柏油马路让人汗流浃背。火锅店或烧烤摊旁的小饮品档口，打扮时髦的姑娘正接过一杯盛满碎冰的饮料。\n\n清澈的冰糖水里飘着翠绿的金桔和鲜黄的柠檬片，视觉上便降温了三分。因为是用纯冰糖中火静置熬化，糖浆没有任何杂质，甜感清澈而高级，绝不粘喉。", "仪式感": ["熬煮冰糖水时切记不可用勺子搅拌，任其在中火下自然融化，保证糖浆冷凉后不返砂不浑浊", "金桔对半切开后，入桶前需用洁净压汁器轻压一下，让果肉核心的微量果汁瞬间与冰糖水融合"], "场景标签": ["休闲", "佐餐", "解腻"]}, "CD-021": {"配方": [["冰糖", "1斤(批次)", "-", "中火熬化，禁止搅拌"], ["清水", "1斤(批次)", "-", "熬糖基底"], ["新鲜草莓", "适量", "-", "纵向一切四瓣，保持块状"], ["草莓酱", "30g(批次)", "-", "二次起香提色"]], "SOP": ["冰糖1斤+清水1斤入锅，中火熬化，禁止搅拌", "熬化后放凉备用", "新鲜草莓洗净，纵向一切四瓣", "草莓块投入放凉的基底糖水中，开火煮2分钟定型控熟", "加草莓酱30g起香提色，关火彻底放凉", "装入洁净密封罐，冰箱冷藏保存（可保存一周）", "出餐时用高透玻璃杯盛装"], "毛利": "成本¥1.60/杯(400ml) → 零售¥8.00 → 毛利80.0%", "设备": "不锈钢轻型熬煮锅¥100-200 / 果蔬清洗沥水台¥100-200 / 台式保鲜冷藏柜¥800-1200, 共计约¥1,300", "替代": "草莓→树莓或蓝莓(颜色风味不同) / 草莓酱→自熬草莓浓缩汁(成本更低)", "变体": "水晶黄桃糖水/水晶荔枝糖水/水晶杨梅糖水", "常见问题": "Q:草莓块煮烂了形态软塌? A:煮制时间超过2分钟或火力太大,严格控制在2分钟即离火加酱降温", "建议图片描述": "A premium crystal-clear glass bowl filled with traditional Chinese strawberry dessert soup (Shuijing Caomei Tangshui). Large, perfectly cut quarters of bright red strawberries are floating in a fully translucent, glistening pink-tinted clear syrup with glints of light reflecting off the surface. Elegant cafe interior background with a soft warm blur, dramatic macro shot capturing the plump strawberry seeds and wet texture, high-resolution dessert culinary photography, no text, no recipe.", "美食故事": "甜品店的明亮橱窗里，一排排玻璃罐盛装的水晶草莓糖水在灯光下泛着梦幻般的粉红色。放学的小女孩扯着妈妈的衣角，眼睛直勾勾地盯着那罐红艳艳的果肉。\n\n勺子舀下去，冰镇过的草莓块依然保持着规整的四瓣形态。纯冰糖熬制的糖水通透得像水晶，在优质草莓酱的晕染下呈现出清澈的玛瑙红。", "仪式感": ["草莓块入汤煮制必须严格限定在2分钟，时间一到立刻加入冷调草莓酱降温", "出品时选用高透玻璃杯，勺子舀起时带出一块完整草莓与一勺清亮红汤"], "场景标签": ["休闲", "零食", "解腻"]}, "CD-022": {"配方": [["鸡油", "200g(批次)", "-", "底油金黄油亮"], ["海南黄灯笼椒酱", "250g(批次)", "-", "酸辣核心，金黄汤色"], ["泡酸菜", "200g(批次)", "-", "酸菜底味"], ["普通酸菜", "400g(批次)", "-", "酸菜量主体"], ["野山椒", "300g(批次) 肉/烤苕皮夹辣条", "常见问题": "Q:苕皮烤不鼓泡? A:火不够旺或苕皮太干,炭火要旺,苕皮表面可轻刷水。Q:红油发苦? A:香料炸过头或油温太高下辣椒面,严格按190→170两段温度控温", "建议图片描述": "A cinematic, close-up macro shot of a classic Chongqing-style grilled Shaopi (sweet potato starch skin) on a smoking barbecue grill. The starch skin is bubbles up, beautifully blistered, and charred with perfect grill marks, gleaming under a thick, rich layer of signature red chili sauce and sesame paste glaze. Generous amounts of coarse-crushed walnuts, peanut powder, toasted sesame seeds, and chopped scallions are showered on top. Puffs of aromatic wood smoke swirl around the food. Dark night-market background with warm, gritty food stall illumination, high-end food documentary photography, razor-sharp focus on the blistered crispy texture, no text, no recipe.", "美食故事": "烤苕皮的精髓，全在出炉前那一记闷香。浸润了葱姜洋葱、历经190℃和170℃两段精确降温激作出来的专用红油，混合着醇厚的芝麻酱与一丝若隐若现的番茄酸甜，牢牢挂在烤到通体鼓泡、两面微焦硬挺的红薯皮上。\n\n一口咬下去，外皮是带点韧劲的脆，内里是黏糯软糊的糯。然而最让人惊艳的，是原稿配方里神来之笔的\"核桃酥\"与\"花生粉\"撒料。当滚烫的油脂遇到压碎的核桃酥，糕点的酥脆和坚果的熟香在舌尖瞬间沙化开来，配合酸萝卜的爽脆，多重口感排山倒海。", "仪式感": ["红油熬制严格遵循190℃下芝麻→170℃下辣椒面的双温阶梯工艺，淋香醋白酒借挥发激香", "专用撒料中核桃酥与花生粉需现压碎现用，遇热苕皮油脂瞬间沙化，产生坚果高香的致命成瘾性"], "场景标签": ["零食", "夜宵", "下酒"]}, "CD-030": {"配方": [["大茴香", "基数10", "-", "香料粉主体"], ["小茴香", "基数10", "-", "香料粉主体"], ["罗汉果", "基数0.3", "-", "回甘"], ["千里香", "基数1", "-", "异香"], ["桂皮", "基数3.5", "-", "复合香"], ["甘草", "基数10", "-", "回甘调和"], ["花椒", "基数2", "-", "麻香底"], ["白芷", "基数2", "-", "去膻增香"], ["山奈", "基数2", "-", "增香"], ["干姜", "基数2", "-", "姜香"], ["豆蔻", "基数2", "-", "去腥增香"], ["丁香", "基数1.5", "-", "尖香点缀"], ["香砂", "基数2", "-", "增香"], ["香叶", "基数1", "-", "清香"], ["白寇", "基数1.2", "-", "去腥"], ["肉蔻", "基数0.9", "-", "增香"], ["陈皮", "基数1.2", "-", "果香解腻"], ["木香", "基数0.9", "-", "异香"], ["砂仁", "基数0.9", "-", "增香去腥"], ["草果", "基数2", "-", "去腥增香"], ["白胡椒", "基数0.3", "-", "辛香"], ["荜拨", "基数0.3", "-", "去腥"], ["白糖", "75g(10斤版)", "-", "回甘调和"], ["盐", "90g(10斤版)", "-", "基咸"], ["味精", "25g(10斤版)", "-", "提鲜"], ["葱", "40g(10斤版)", "-", "腌制去腥"], ["姜", "40g(10斤版)", "-", "腌制去腥"], ["蒜", "40g(10斤版)", "-", "腌制增香"], ["色拉油", "5份(底油)", "-", "油炸基底"], ["棕榈油", "1份(底油)", "-", "增稠起酥"]], "SOP": ["预制香料粉：22味中草药按比例（大茴香10:小茴香10:罗汉果0.3:千里香1:桂皮3.5:甘草10:花椒2:白芷2:山奈2:干姜2:豆蔻2:丁香1.5:香砂2:香叶1:白寇1.2:肉蔻0.9:陈皮1.2:木香0.9:砂仁0.9:草果2:白胡椒0.3:荜拨0.3）粉碎成颗粒状", "以10斤鸭子为基准：水975g+腌料75g入桶搅匀，大火烧开转小火煮1小时（不加盖）", "细纱布过滤废渣，料水置凉", "凉料水中加蒜40g+葱40g+姜40g+糖75g+盐90g+味精25g搅匀", "鸭子洗净，入料水腌制", "底油：色拉油5份+棕榈油1份混合", "腌制好的鸭子入油锅炸制至色泽金黄，口感酥脆"], "毛利": "成本待按实际出成率核算（含整鸭+22味香料粉+油炸损耗）", "设备": "商用油炸炉或大型炸锅 / 熬料桶 / 细纱布过滤网", "替代": "棕榈油→起酥油(效果接近但成本略高) / 色拉油→大豆油(需调整比例)", "变体": "茶油鸭腿/茶油鸭翅/茶油鸭锁骨", "常见问题": "Q:鸭子炸出来颜色偏差? A:油温控制不当或腌制时间不足。Q:味道不入骨? A:腌制时间不够,需确保料水完全渗透", "建议图片描述": "A close-up shot of a whole crispy golden-brown Beijing-style tea-oil duck hanging in a display window of a traditional Chinese delicatessen. The duck skin is perfectly fried to a glossy mahogany-golden color with a thin sheen of aromatic oil, garnished with scattered whole spices. Warm, inviting night market stall ambiance, soft dramatic lighting, high-resolution culinary portrait photography, no text, no recipe.", "美食故事": "老北京茶油鸭的招牌前，排队的人永远不比烤鸭店少。那刚从油锅捞出的鸭子，通体呈现出诱人的焦糖色，22味中草药在高温油炸的催化下，释放出霸道而醇厚的复合香气。\n\n夹起一块炸得酥脆的鸭皮送入口中，外壳咔嚓碎裂，皮下脂肪已经炸透。而藏在中草药料水里腌制入味的鸭肉，咸鲜中带着甘草和罗汉果的清甜回甘，大茴香与小茴香的暖香、桂皮和陈皮的果香、花椒和白芷的辛麻层层递进。", "仪式感": ["22味中草药需严格按基数比例粉碎成颗粒状，保证每批料水风味一致", "底油必须按色拉油5:棕榈油1的比例混合，棕榈油提供酥脆口感，色拉油保证色泽金黄透亮"], "场景标签": ["佐餐", "下酒", "休闲"]}, "CD-031": {"配方": [["海鲜酱", "500g", "-", "甜酱基底，主味"], ["柱侯酱", "500g", "-", "复合酱香"], ["白糖", "300g", "-", "回甘调和"], ["蚝油", "200g", "-", "提鲜挂汁"], ["南乳", "75g", "-", "腐乳底香，独特风味"], ["美极鲜酱油", "75g", "-", "鲜咸调色"], ["芝麻油", "75g", "-", "尾香提味"], ["花生酱", "75g", "-", "增稠坚果香"], ["腐乳", "75g", "-", "复合发酵香"], ["食用植物油", "10g", "-", "爆香底油"], ["味精", "20g", "-", "提鲜"], ["鸡精", "20g", "-", "增鲜"], ["蒜茸", "10g", "-", "蒜香底味"], ["红葱头茸", "10g", "-", "葱香底味"], ["姜蓉", "10g", "-", "姜香去腥"]], "SOP": ["海鲜酱500g+柱侯酱500g+白糖300g+蚝油200g+南乳75g+腐乳75g+芝麻油75g+花生酱75g+美极鲜酱油75g混合搅拌成糊状", "植物油10g入锅大火烧热，下蒜茸10g+红葱头茸10g+姜蓉10g+味精20g+鸡精20g爆香", "转慢火，加入酱类拌成的糊，搅拌均匀", "慢火煮5分钟至不粘炒勺为准", "起锅用干燥洁净器皿盛装，常温密封保存"], "毛利": "成本约¥1.00/份(30ml蘸料折算) → 可作片皮类产品配套蘸酱", "设备": "不锈钢炒锅 / 搅拌盆 / 密封罐", "替代": "海鲜酱→柱侯酱+甜面酱调(风味不同) / 南乳→红腐乳+少量曲酒(接近)", "变体": "烤鸭酱/烧鹅酱/蜜汁叉烧酱", "常见问题": "Q:酱汁容易变质? A:炒制时间不足或器皿未擦干,煮够5分钟至不粘勺,确保器皿干燥洁净", "建议图片描述": "A close-up of a rich, dark reddish-brown Chinese roast suckling pig sauce (Kaoruzhu Jiang) in a ceramic bowl, thick and glossy texture with visible specks of fermented bean paste and garlic. Warm professional kitchen lighting, macro shot capturing the smooth, sticky sauce surface, high-resolution food photography, no text, no recipe.", "美食故事": "广式烧腊档口前，刚出炉的烤乳猪通体油亮酥脆，最让人念念不忘的不是脆皮本身，而是那碟深棕浓稠、复合着六种酱料精华的蘸酱。\n\n海鲜酱与柱侯酱提供了甜咸交织的丰厚基底，南乳和腐乳在慢火熬煮中释放出独特的发酵醇香，蚝油与美极鲜酱油把鲜度拉满，最后以蒜茸和红葱头的爆香收尾。", "仪式感": ["六种酱料混合成糊后再与爆香料头合炒，确保香体与酱体层次分明", "煮至不粘炒勺为出锅标准，保证水分完全收干，密封耐储"], "场景标签": ["佐餐", "酱料"]}, "CD-032": {"配方": [["五花肉", "5kg(批次)", "-", "主料，切大块"], ["八角", "500g(香料粉批次)", "-", "君料"], ["山奈", "150g(香料粉批次)", "-", "增香"], ["丁香", "100g(香料粉批次)", "-", "尖香点缀"], ["香叶", "500g(香料粉批次)", "-", "清香"], ["白蔻", "400g(香料粉批次)", "-", "去腥增香"], ["草果", "500g(香料粉批次)", "-", "去腥增香"], ["桂皮", "300g(香料粉批次)", "-", "复合香"], ["干姜", "300g(香料粉批次)", "-", "姜香去腥"], ["排草", "350g(香料粉批次)", "-", "增香"], ["甜面酱", "适量", "-", "腌制酱香基底"], ["辣椒酱", "适量", "-", "蘸料配餐"]], "SOP": ["预制香料粉：八角500g+山奈150g+丁香100g+香叶500g+白蔻400g+草果500g+桂皮300g+干姜300g+排草350g打碎混合", "五花肉洗净切大块，加香料粉+甜面酱抓匀，腌渍3-4小时", "泥瓦缸内放点燃无烟木炭，腌好五花肉用钩子挂好，吊入缸内", "先微火烤2-3小时，然后转大火烤30分钟", "烤好后继续放缸内，木炭保持微火保温", "客人点菜时取肉切厚0.6cm大块，入烧烫铁盘加热2分钟", "配辣椒酱上桌"], "毛利": "成本约¥10-12/份(含五花肉+香料+炭火损耗, 250g/份) → 零售¥28-38 → 毛利58-68%", "设备": "泥瓦缸烤炉¥300-600 / 铁钩 / 烧烫铁盘¥50-100 / 无烟木炭", "替代": "泥瓦缸→不锈钢缸式烤炉(保温性略差) / 甜面酱→海鲜酱(风味偏甜)", "变体": "烤五花肉配生菜/蜜汁烤五花/香辣烤五花", "常见问题": "Q:肉烤出来太干柴? A:微火烤制时间不足或火太大,先微火2-3小时慢烤锁汁再大火上色。Q:香料味过重? A:香料粉用量过多,5kg肉配20-30g香料粉即可", "建议图片描述": "A close-up shot of thick slices of charcoal-roasted Chinese pork belly (Kao Wu Hua Rou) sizzling on a hot cast iron plate. The meat shows perfect layers of crispy dark-brown skin, tender fat, and juicy lean meat, garnished with a side of red chili dipping sauce. Rustic clay pot kiln background with glowing charcoal embers visible, warm smoky evening lighting, high-resolution food photography, no text, no recipe.", "美食故事": "街角的泥瓦缸烤炉前，炭火的红光映在老板脸上。刚出炉的五花肉在铁盘上滋滋作响，油脂在高温下跳动，香气顺着烟气飘散。\n\n夹起一片0.6厘米厚的烤五花，外皮焦脆，肥肉部分已经烤到半透明，入口即化却不腻口。瘦肉经过3小时微火慢烤，汁水完全锁住，八味香料粉的复合香气从肉理深处层层释放。", "仪式感": ["泥瓦缸烤制全程先微火2-3小时锁汁再大火30分钟上色，两段式控火是外焦里嫩的关键", "客人点菜时现切0.6cm厚片入铁盘加热2分钟上桌，保持铁盘温度让油脂持续跳动"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-033": {"配方": [["小黄鱼", "7条约250g", "-", "主料，去鳞去内脏"], ["小香葱节", "150g", "-", "垫底盖面，浇热油激香"], ["色拉油", "1kg(炸用)+适量(炒用)", "-", "油炸+浇油"], ["煳辣椒", "50g", "-", "干炒捣碎，焦香微糊"], ["盐", "6g", "-", "基咸"], ["胡椒粉", "1g", "-", "辛香去腥"], ["香油", "2g", "-", "尾香提味"], ["料酒", "10g", "-", "去腥"], ["味精", "7g", "-", "提鲜"], ["生粉", "20g", "-", "拍粉，炸后酥脆"], ["丘北干辣椒", "适量", "-", "煳辣椒原料，尖椒红辣"]], "SOP": ["煳辣椒制作：干丘北辣椒入净锅干炒至发出焦香味、表面略糊，趁热入石臼捣碎（不要太细）", "小黄鱼去鳞去内脏洗净，加料酒10g+胡椒粉1g+盐6g+味精7g+香油2g腌制入味", "腌好后拍生粉20g，入六成热油炸至酥脆，捞出切成两段", "锅放底油烧至六成热，下黄鱼段+煳辣椒50g+盐+味精炒匀，置于盘中", "盖上小香葱节150g，浇上七成热油激香即可"], "毛利": "成本约¥6-8/份(7条小黄鱼) → 零售¥18-25 → 毛利60-68%", "设备": "炒锅 / 炸锅 / 石臼(捣煳辣椒) / 漏勺", "替代": "丘北辣椒→二荆条干辣椒(香够辣不够) / 小黄鱼→小黄花鱼(肉质略粗)", "变体": "烤小黄鱼配孜然/香辣小黄鱼/椒盐小黄鱼", "常见问题": "Q:鱼炸出来不酥脆? A:生粉没拍匀或油温不够,六成热下锅炸至金黄酥脆再捞出。Q:煳辣椒不香? A:干炒火候不够,必须炒至表面略糊出焦香再捣碎", "建议图片描述": "A close-up of crispy deep-fried small yellow croakers (Kao Xiao Huang Yu) arranged on a plate, topped with a generous pile of fresh chopped scallion sections and sizzling hot chili oil. The fish is golden-brown and crispy, with visible crushed dry-fried chilies (糊辣椒) scattered on top. Warm steam rising from the freshly poured hot oil, rustic dinner table setting, soft overhead lighting, high-resolution food photography, no text, no recipe.", "美食故事": "云贵街边的小馆子里，煳辣椒的焦香隔着几条街都能闻到。刚出锅的小黄鱼通体金黄酥脆，铺在碧绿的香葱节上，一勺滚油浇下去，\"嗞啦\"一声，葱香和煳辣椒的焦香瞬间炸开。\n\n夹起一条，外皮酥脆到轻轻一碰就掉渣，里面的鱼肉却嫩滑入味。煳辣椒特有的焦香和微辣，配合小葱经热油激发后的清甜，入口层次分明，越嚼越香，下酒一流。", "仪式感": ["煳辣椒必须干炒至表面略糊出焦香再捣碎，太细则失去焦香颗粒感", "最后浇七成热油是小黄鱼的灵魂一步，激发出葱香与煳辣椒的双重香气"], "场景标签": ["佐餐", "下酒", "零食"]}, "CD-034": {"配方": [["鸡翅中", "12个", "-", "主料，做锤型过油"], ["秘制腌料", "50g", "-", "腌制入味"], // Render grid
function render(q) {
  var g = document.getElementById('grid'), h = '', qe = (q||'').toLowerCase()
  CARDS.forEach(function(c){
    if(cur!='全部' && c.c!=cur) return
    if(qe && c.n.indexOf(qe)<0) return
    h += '<div class="card" onclick="o(\''+c.i+'\')"><div class="img">'+(c.p?'<img src="'+c.p+'">':'🍽️')+'</div><div class="body"><div class="name">'+c.n+'</div><div class="meta"><span class="tag">'+c.c+'</span><span>'+c.m+'</span></div></div></div>'
  })
  g.innerHTML = h||'<div style="padding:40px;text-align:center;color:#999">没有找到匹配的产品</div>'
}
function f() { render(document.getElementById('q').value) }
// Filter chips
function chips() {
  var d = '', curcat = cur

  document.getElementById('chips').innerHTML = d
}

  }
  if(cd.毛利) h += '<div class="d-sec"><div class="d-h">毛利模型</div><div class="d-p">'+cd.毛利+'</div></div>'
  if(cd.设备) h += '<div class="d-sec"><div class="d-h">投入产出</div><div class="d-p">'+cd.设备+'</div></div>'
  if(cd.替代) h += '<div class="d-sec"><div class="d-h">替代方案</div><div class="d-p">'+cd.替代+'</div></div>'
  if(cd.变体) h += '<div class="d-sec"><div class="d-h">变体推荐</div><div class="d-p">'+cd.变体+'</div></div>'
  if(cd.常见问题) h += '<div class="d-sec"><div class="d-h">常见问题</div><div class="d-p">'+cd.常见问题+'</div></div>'
  if(cd.美食故事) h += '<div class="d-sec"><div class="d-h">场景故事</div><div class="d-p">'+cd.美食故事+'</div></div>'
  if(cd.仪式感) { h += '<div class="d-sec"><div class="d-h">仪式感</div><div class="d-p">'; cd.仪式感.forEach(function(s){ h += '▸ '+s+'\n' }); h += '</div></div>' }
  if(cd.建议图片描述) h += '<div class="d-sec"><div class="d-h">图片Prompt</div><div class="d-p" style="font-size:11px;color:#888">'+cd.建议图片描述+'</div></div>'
  h += '<div style="text-align:center;padding:20px 0 40px"><button class="sub-btn" onclick="sub()">订阅解锁完整版</button></div>'
  document.getElementById('db').innerHTML = h
  d.classList.add('active'); document.body.style.overflow='hidden'
}
function c() { document.getElementById('detail').classList.remove('active'); document.body.style.overflow='' }
function share() { navigator.clipboard&&navigator.clipboard.writeText(window.location.href).then(function(){alert('链接已复制')}) }
chips(); render('')
