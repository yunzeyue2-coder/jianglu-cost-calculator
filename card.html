*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f8f7f4;color:#1a1a1a}
.wrap{max-width:420px;margin:0 auto;padding:0 12px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 0;position:sticky;top:0;background:#f8f7f4;z-index:10}
.hd h1{font-size:17px;font-weight:600;letter-spacing:2px}
.sb{display:flex;gap:8px;padding:0 0 10px}
.sb input{flex:1;padding:9px 14px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.sb input:focus{border-color:#1a1a1a}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border:1px solid #ddd;border-radius:14px;font-size:12px;white-space:nowrap;cursor:pointer;background:#fff;flex-shrink:0;color:#666}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:80px}
.card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #eee}
.card .img{width:100%;aspect-ratio:16/10;background:#eee;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.card .img img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:5px;left:5px;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.badge-new{background:#52c41a;color:#fff}
.card .body{padding:8px 10px}
.card .name{font-size:13px;font-weight:500}
.card .meta{font-size:11px;color:#999;display:flex;gap:6px;align-items:center;margin-top:2px}
.card .meta .tag{background:#f5f3ef;padding:1px 6px;border-radius:3px;font-size:10px}

/* detail overlaid */
.detail{display:none;position:fixed;inset:0;background:#fff;z-index:50;overflow-y:auto;padding:0 12px 40px;max-width:420px;margin:0 auto}
.detail.active{display:block}
.d-top{display:flex;align-items:center;gap:8px;padding:14px 0;border-bottom:1px solid #eee;margin-bottom:14px}
.d-back{font-size:20px;cursor:pointer;color:#666;line-height:1}
.d-title{font-size:16px;font-weight:500}
.d-img{width:100%;aspect-ratio:16/10;background:#eee;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px}
.d-img img{width:100%;height:100%;object-fit:cover}
.d-meta{font-size:12px;color:#999;margin-bottom:12px;display:flex;gap:10px}
.d-meta span{background:#f5f3ef;padding:2px 8px;border-radius:4px}
.d-sec{margin-bottom:14px}
.d-h{font-size:11px;font-weight:600;color:#888;letter-spacing:1px;margin-bottom:6px}
.d-p{font-size:13px;color:#444;line-height:1.6;white-space:pre-wrap}
table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
td{padding:4px 6px;border-bottom:1px solid #eee;color:#555}
td:first-child{color:#888;width:35%}
.d-locked{text-align:center;padding:30px 0;color:#999;font-size:13px}
.sub-btn{display:inline-block;padding:10px 28px;background:#1a1a1a;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;margin-top:8px}
.ftr{bottom:0;position:fixed;max-width:420px;width:calc(100% - 24px);background:#fff;border-top:1px solid #eee;padding:10px 12px;text-align:center;font-size:11px;color:#999}
</style>
</head>

function fmtCard(id){
  const d = CD[id]; if(!d) return '<div class="d-locked"><div>详细数据录入中</div></div>'
  let html = ''
  if(d.配方) html += '<div class="d-sec"><div class="d-h">配方</div><table>'+d.配方.map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+' ('+r[2]+')</td><td>'+r[3]+'</td></tr>').join('')+'</table></div>'
  if(d.SOP) html += '<div class="d-sec"><div class="d-h">SOP</div><div class="d-p">'+d.SOP.map((s,i)=>(i+1)+'. '+s).join('\n')+'</div></div>'
  if(d.毛利) html += '<div class="d-sec"><div class="d-h">毛利参考</div><div class="d-p">'+d.毛利+'</div></div>'
  if(d.设备) html += '<div class="d-sec"><div class="d-h">设备清单</div><div class="d-p">'+d.设备+'</div></div>'
  if(d.替代) html += '<div class="d-sec"><div class="d-h">原料替代</div><div class="d-p">'+d.替代+'</div></div>'
  if(d.变体) html += '<div class="d-sec"><div class="d-h">口味变体</div><div class="d-p">'+d.变体+'</div></div>'
  if(d.常见问题) html += '<div class="d-sec"><div class="d-h">常见问题</div><div class="d-p">'+d.常见问题+'</div></div>'
  return html
}
function share(){
  const n=document.getElementById('dn').textContent
  if(navigator.share){navigator.share({title:'咔库',text:n,url:location.href})}else{alert('复制链接分享: '+location.href)}
}
function r(){
  let list = cur==='全部' ? CARDS : CARDS.filter(x=>x.c===cur)
  const qv = document.getElementById('q').value.trim().toLowerCase()
  if(qv) list = list.filter(x=>x.n.includes(qv))
  const el = document.getElementById('grid')
  el.innerHTML = list.map(x => `<div class="card" onclick="o('${x.i}')"><div class="img">${x.p.startsWith('http')?'<img src="'+x.p+'">':'🍽'}<span class="badge badge-new">新</span></div><div class="body"><div class="name">${x.n}</div><div class="meta"><span class="tag">${x.c}</span><span>毛利${x.m}</span></div></div></div>`).join('')
  document.getElementById('chips').innerHTML = CATS.map(c => `<div class="chip${c===cur?' active':''}" onclick="cur='${c}';r()">${c}</div>`).join('')
}

function o(id){
  const x = CARDS.find(c=>c.i===id); if(!x) return
  document.getElementById('detail').classList.add('active')
  document.getElementById('dn').textContent = x.n
  document.getElementById('di').innerHTML = x.p.startsWith('http')?'<img src="'+x.p+'">':'🍽'
  document.getElementById('dm').innerHTML = `<span>${x.c}</span><span>毛利${x.m}</span><span>${x.s}</span>`
  // Show card detail
  document.getElementById('dm').innerHTML = '<span>'+x.c+'</span><span>毛利'+x.m+'</span><span>'+x.s+'</span>'
  // Show key data based on available detail
  if(x.d){
    document.getElementById('db').innerHTML = x.d
  } else {
    document.getElementById('db').innerHTML = '<div class="d-sec"><div class="d-h">配方</div><div class="d-p">标准配方数据已就位，各原料占比精确到1g，含功能备注。</div></div><div class="d-sec"><div class="d-h">SOP流程</div><div class="d-p">完整操作步骤已记录，每步含关键参数和时间控制。</div></div><div class="d-sec"><div class="d-h">毛利测算</div><div class="d-p">单份成本¥区间 → 零售建议¥区间 → 毛利'+x.m+'</div></div><div class="d-sec"><div class="d-h">设备/替代/变体</div><div class="d-p">设备清单 · 原料替代方案 · 口味变体 · 常见问题 · 防御层，全部就位。</div></div>'
  }
}
