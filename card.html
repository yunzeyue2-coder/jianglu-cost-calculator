<link rel="manifest" href="/jianglu-cost-calculator/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f8f7f4;color:#1a1a1a}
.wrap{max-width:420px;margin:0 auto;padding:0 12px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 0;position:sticky;top:0;background:#f8f7f4;z-index:10}
.hd h1{font-size:17px;font-weight:600;letter-spacing:2px}
.sb{display:flex;gap:8px;padding:0 0 10px}
.sb input{flex:1;padding:9px 14px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.sb input:focus{border-color:#1a1a1a}
.chips{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border:1px solid #ddd;border-radius:14px;font-size:12px;white-space:nowrap;cursor:pointer;background:#fff;flex-shrink:0;color:#666}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:80px}
.card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #eee}
.card .img{width:100%;aspect-ratio:16/10;background:#eee;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden}
.card .img img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;top:5px;left:5px;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.badge-new{background:#52c41a;color:#fff}
.card .body{padding:8px 10px}
.card .name{font-size:13px;font-weight:500}
.card .meta{font-size:11px;color:#999;display:flex;gap:6px;align-items:center;margin-top:2px}
.card .meta .tag{background:#f5f3ef;padding:1px 6px;border-radius:3px;font-size:10px}

/* detail overlaid */
.detail{display:none;position:fixed;inset:0;background:#fff;z-index:50;overflow-y:auto;padding:0 12px 40px;max-width:420px;margin:0 auto}
.detail.active{display:block}
.d-top{display:flex;align-items:center;gap:8px;padding:14px 0;border-bottom:1px solid #eee;margin-bottom:14px}
.d-back{font-size:20px;cursor:pointer;color:#666;line-height:1}
.d-title{font-size:16px;font-weight:500}
.d-img{width:100%;aspect-ratio:16/10;background:#eee;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px}
.d-img img{width:100%;height:100%;object-fit:cover}
.d-meta{font-size:12px;color:#999;margin-bottom:12px;display:flex;gap:10px}
.d-meta span{background:#f5f3ef;padding:2px 8px;border-radius:4px}
.d-sec{margin-bottom:14px}
.d-h{font-size:11px;font-weight:600;color:#888;letter-spacing:1px;margin-bottom:6px}
.d-p{font-size:13px;color:#444;line-height:1.6;white-space:pre-wrap}
table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
td{padding:4px 6px;border-bottom:1px solid #eee;color:#555}
td:first-child{color:#888;width:35%}
.d-locked{text-align:center;padding:30px 0;color:#999;font-size:13px}
.sub-btn{display:inline-block;padding:10px 28px;background:#1a1a1a;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;margin-top:8px}
.ftr{bottom:0;position:fixed;max-width:420px;width:calc(100% - 24px);background:#fff;border-top:1px solid #eee;padding:10px 12px;text-align:center;font-size:11px;color:#999}
</style>
</head>

末异香与表层的油脂均匀混合后再行浇淋"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-008": {"配方": [["无核阿胶枣", "150g", "-", "泡软打碎，甜润主体"], ["开水", "500ml", "-", "泡枣介质"], ["红枣果汁伴侣", "80ml", "-", "风味调和"], ["优果粉", "18g (1.5勺)", "-", "复合底味"], ["奶粉", "6g (1/2勺)", "-", "微调奶香，丝滑口感"], ["开水", "补至1250ml", "-", "二次打浆调稀"]], "SOP": ["取无核阿胶枣150g，投入500ml开水中浸泡2分钟充分吸水软化", "开启榨汁机高速榨20秒打碎枣泥", "加入红枣果汁伴侣80ml+优果粉1.5勺(18g)+奶粉半勺(6g)", "补开水至1250ml，二次高速榨20秒", "细密网过滤，用刮刀轻压滤网使细腻果肉与汁水融合", "保温桶储存，随杯出品"], "毛利": "成本¥2.10/杯(350ml) → 零售¥9.00 → 毛利76.7%", "设备": "商用高功率静音破壁机¥800-1200 / 保温储液桶¥250-400 / 不锈钢细密过滤网¥80-120, 共计约¥1,650", "替代": "无核阿胶枣→普通去核红枣+少量红糖(缺阿胶药香) / 红枣果汁伴侣→自制红枣浓缩汁", "变体": "枸杞红枣汁/桂圆红枣汁/红枣姜茶", "常见问题": "Q:有渣感口感粗糙? A:浸泡时间不够,枣未充分软化,需泡足2分钟再打", "建议图片描述": "A steaming cup of rich, smooth light-brown jujube juice in a stylish minimalist paper cup, set on a dark rustic stone counter. A small wooden bowl containing a few premium pitless red dates and a faint splash of fresh milk on the side. Beautiful soft overhead backlighting catching the natural steam rising from the cup, shallow depth of field, professional hot beverage photography, no text, no recipe.", "美食故事": "冬日深夜的养生推车前，滚烫的雾气不断从盖缝中溢出。加班到凌晨的年轻女孩在摊位前驻足，哈着气点了一杯热枣汁。\n\n刚破壁过滤好的阿胶红枣汁呈现出温暖的浅红褐色，倒入纸杯时浓稠高挂。微弱的奶香刚好中和了红枣过于直白的甜腻，入口极其丝滑软糯，一股带着阿胶和红枣特殊甜润的暖流顺着食道一路滑进胃里，驱散了冬夜通宵积攒的所有寒意。", "仪式感": ["过滤时用刮刀轻压滤网，使细腻的枣泥果肉与汁水完全融合，只留下粗糙的皮渣", "双手捧着刚出锅的纸杯，深吸一口扑面而来的浓郁枣香与微弱奶香，再趁热小口饮用"], "场景标签": ["佐餐", "零食", "夜宵"]}, "CD-009": {"配方": [["炒熟去皮花生仁", "100g", "-", "油脂醇香核心"], ["全麦复合粉", "30g (2大勺)", "-", "糊化增稠，谷物甜味"], ["麦香果汁伴侣", "80ml", "-", "风味调和"], ["奶粉", "半勺", "-", "奶香顺滑"], ["优果粉", "1勺", "-", "复合底味"], ["开水(90℃+)", "至1250ml", "-", "一次700ml+二次补足"]], "SOP": ["炒熟去皮花生仁100g投入榨汁机", "加全麦复合粉30g，冲入90℃以上开水至700ml", "高速榨汁，利用高温使全麦粉充分糊化增稠", "加麦香果汁伴侣80ml+奶粉半勺+优果粉1勺", "补开水至1250ml，二次高速榨匀", "无需过滤，保留全麦膳食纤维，保温桶储存"], "毛利": "成本¥1.60/杯(350ml) → 零售¥7.00 → 毛利77.1%", "设备": "商用高功率破壁机¥800-1200 / 大容量开水器¥300-500 / 全封闭保温桶¥250-400, 共计约¥1,800", "替代": "炒熟花生→生花生+烤箱自炒(需控制火候) / 全麦复合粉→燕麦粉+麦麸(口感略粗)", "变体": "花生核桃汁/黑芝麻全麦汁/红豆薏米汁", "常见问题": "Q:口感稀薄水感重? A:全麦糊化不够,必须用90℃以上开水或增加全麦粉用量", "建议图片描述": "A warm steaming glass mug filled with thick, creamy beige peanut whole wheat juice, placed on a light-colored wooden table. A small rustic ceramic bowl next to it containing a handful of roasted, peeled peanuts and some whole wheat grains. Soft morning window light illuminating the natural steam rising, cozy and authentic breakfast atmosphere, shallow depth of field, high-resolution beverage photography, no text, no recipe.", "美食故事": "清晨六点的大学城后街，早餐摊位的蒸屉正呼呼冒着白烟。赶早八课程的学生揉着眼睛在摊位前驻足，喊道：\"老板，拿杯热花生全麦，打包带走！\"\n\n刚打好的花生全麦汁呈现出温暖的乳麦黄色，浓稠度刚好挂杯。炒花生的油脂香气在90度以上热水的冲激下被成倍放大，混合着全麦糊化后特有的天然谷物甜味。猛吸一口，温热的浆液滑过喉咙，带着微微的颗粒感与醇厚奶香，既解了口渴又填补了空荡的胃。", "仪式感": ["冲入90度以上开水时动作要快，借助高温在破壁前瞬间锁住全麦粉的淀粉结构", "封盖前摇晃杯身，让表面自然形成的细腻谷物泡沫与空气充分接触，使香气更易散发"], "场景标签": ["佐餐", "零食", "夜宵"]}, "CD-010": {"配方": [["鸡腿肉", "500g", "-", "剁块，主料"], ["秘制酱料", "70g", "-", "腌制5h+焖烧，核心调味"], ["蚝油", "450g(批次)", "-", "酱底基础鲜味"], ["酱油", "300g(批次)", "-", "咸鲜底色"], ["黄豆酱", "200g(批次)", "-", "复合酱香"], ["生抽", "150g(批次)", "-", "增鲜调色"], ["红烧汁", "100g(批次)", "-", "深化酱色"], ["白糖", "50g(批次)", "-", "回甘调和"], ["鲍鱼汁", "50g(批次)", "-", "海鲜复合鲜"], ["鸡汁鸡精", "35g(批次)", "-", "提鲜"], ["五香粉", "30g(批次)", "-", "复合香底"], ["鲜香菇", "50g", "-", "增鲜吸汁"], ["青椒", "25g", "-", "清香配色"], ["鲜汤", "250g", "-", "高压介质"], ["生姜", "适量", "-", "去腥增香"]], "SOP": ["熬酱：蚝油450g+酱油300g+黄豆酱200g+生抽150g+红烧汁100g+白糖50g+鲍鱼汁50g+鸡汁鸡精35g+五香粉30g混合熬5分钟成秘制酱", "鸡腿肉500g剁块，加70g酱料拌匀，冷藏腌制5小时", "出餐：鸡肉块+生姜+鲜汤250g入高压锅，上气压3分钟锁汁", "倒入砂锅，下鲜香菇50g烧开焖约3分钟", "投入青椒块25g，借着余热快速翻搅三次", "砂锅上桌，先吃肉后拌饭"], "毛利": "成本¥6.80/份(含鸡腿肉+香菇青椒+酱料) → 零售¥16.00 → 毛利57.5%", "设备": "商用双头高压锅¥800-1200 / 多头砂锅组合灶¥1200-1800 / 冷藏工作台¥800-1200, 共计约¥3,500", "替代": "鸡腿肉→鸡全腿或琵琶腿(需调整腌制时间) / 鲍鱼汁→干贝+蚝油(鲜度略降)", "变体": "麻辣黄焖鸡/蒜香黄焖鸡/菌菇黄焖鸡", "常见问题": "Q:鸡肉柴不嫩? A:腌制时间不够或高压压制过久,必须冷藏腌足5小时,上气后3分钟即止", "建议图片描述": "A classic Chinese Huangmen chicken stew served in a sizzling, authentic black clay pot. Large, juicy chunks of braised chicken thigh meat, plump shiitake mushrooms, and vibrant green bell pepper pieces are coated in a rich, glossy golden-brown savory gravy. Wisps of hot steam are naturally rising from the dish. Warm restaurant ambient lighting, extreme close-up shot focusing on the bubbling sauce texture, shallow depth of field, high-resolution food culinary photography, no text, no recipe.", "美食故事": "中午十二点的写字楼后巷，黄焖鸡小馆的油烟机轰轰作响。外卖员进进出出，店里坐满了刚打完卡的上班族，个个伸长脖子张望：\"老板，我的黄焖鸡加辣，多加点汤汁！\"\n\n单人份的小砂锅端上来时还在剧烈翻滚，浓稠的黄褐色酱汁将鸡腿肉、香菇片裹得严严实实。经过高压锅3分钟的压制，鸡腿肉饱含汤汁，用筷子轻轻一拨就骨肉分离；鲜香菇吸饱了蚝油和鲍鱼汁的复合鲜味，把滚烫的浓汁兜头浇在白米饭上，酱香伴着青椒的清香，几下就能扒光一整碗饭。", "仪式感": ["砂锅离火，借着余热投入鲜青椒块，用筷子快速翻搅三次，利用酱汁的高温瞬间激发出青椒的清爽香气", "上桌时砂锅滋滋作响、汤汁微沸，提醒食客\"先吃肉，后拌饭\""], "场景标签": ["佐餐", "夜宵"]}, "CD-011": {"配方": [["猪筒骨/脊骨", "500g(单份)", "-", "主料，酱卤熟制"], ["高汤", "60斤(批次)", "-", "卤水基底"], ["八角", "80g(批次)", "-", "君料，增香"], ["桂皮", "40g(批次)", "-", "复合香"], ["草蔻", "40g(批次)", "-", "去腥增香"], ["白蔻", "30g(批次)", "-", "清凉辛香"], ["小茴香", "40g(批次)", "-", "回香引子"], ["山奈", "35g(批次)", "-", "增香"], ["良姜", "20g(批次)", "-", "去腥"], ["草果去籽", "20g(批次)", "-", "去腥增香"], ["香叶", "25g(批次)", "-", "清香"], ["肉蔻", "15g(批次)", "-", "增香"], ["花椒", "10g(批次)", "-", "微麻去腥"], ["甘草", "10g(批次)", "-", "回甘调和"], ["白芷", "10g(批次)", "-", "去膻增香"], ["丁香", "10g(批次)", "-", "尖香点缀"], ["姜", "400g(批次)", "-", "炸香后入卤"], ["葱", "400g(批次)", "-", "炸香后入卤"], ["料酒", "1瓶(批次)", "-", "去腥"], ["盐", "500g(批次)", "-", "基咸"], ["生抽", "500g(批次)", "-", "咸鲜调色"], ["味精", "50g(批次)", "-", "提鲜"], ["鸡精", "50g(批次)", "-", "提鲜"], ["糖色", "100g(批次)", "-", "天然上色"], ["红曲米水", "350g(批次)", "-", "红润增色"]], "SOP": ["18味香料拍破，用水浸泡10分钟去燥，捞出装香料包", "不锈钢桶加高汤60斤，投入香料包", "姜400g+葱400g提前炸香，入桶", "加料酒1瓶+盐500g+生抽500g+味精50g+鸡精50g+糖色100g+红曲米水350g", "小火熬30分钟成基础酱大骨卤水", "大骨焯水去血沫，入卤水小火卤制至肉质酥烂", "上桌前用原桶卤汁将大骨重新烫透，至油亮挂汁即可出盘"], "毛利": "成本¥12.50/份(含大骨500g+卤水折旧) → 零售¥28.00 → 毛利55.4%", "设备": "100L不锈钢商用汤桶¥600-1000 / 大功率商用燃气灶¥1500-2500 / 展示保温柜¥500-800, 共计约¥2,600", "替代": "红曲米水→红曲粉+热水调开(色泽略暗) / 高汤→鸡骨架+猪骨熬制(成本更低)", "变体": "麻辣酱大骨/藤椒酱大骨/茶香酱大骨", "常见问题": "Q:卤水发苦? A:香料未浸泡去燥或丁香过量,必须泡10分钟再入卤", "建议图片描述": "A generous pile of traditional Chinese braised pork bones (Jiang Da Gu) piled high on a rustic ceramic platter, glistening with a rich, glossy dark-red savory sauce. Some bones show exposed rich marrow, and succulent meat is tenderly clinging to the bone structure. Plumes of hot, natural steam swirl around the dish. Warm, dramatic tavern ambient lighting, close-up shot focusing on the moist meat texture and reflective sauce, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "晚上八点的东北菜馆里，堂食的木桌上已经摞起了空啤酒瓶。老客们刚坐下，连菜单都不看，直接冲着柜台吆喝：\"老板，先整两斤酱大骨，多带点骨髓的！\"\n\n大瓷盘子一端上来，堆得像小山一样的大骨棒热气腾腾，红曲米水与糖色赋予了它天然的酱红光泽。用手直接抓起一根，饱含卤汁的瘦肉附着在骨节上，经过复合香料小火慢熬的卤水已经吃透进肉质纤维。撕咬下一大块瘦肉，酱香和脂香在口中爆发，最后拿根吸管往骨髓腔里一插，吸溜一口温热肥美的骨髓，这才是酱卤最扎实的江湖气。", "仪式感": ["卤好上桌前，必须用原桶卤汁将大骨重新烫透，让附着在骨头表面的油脂再次化开，达到\"油亮挂汁\"的视觉状态", "随盘附赠一次性手套与吸管，提醒食客先吃肉、后吸髓，完成酱卤大骨的终极解馋仪式"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-012": {"配方": [["五得利面包粉", "2.5斤(批次)", "-", "主面粉，筋度高外脆"], ["中筋面粉(富强粉)", "0.5斤(批次)", "-", "调和筋度"], ["温水", "4-4.5斤(批次)", "-", "调糊介质"], ["鸡蛋", "4-6个(批次)", "-", "蛋香+膨松"], ["调和油", "100g(批次)", "-", "润糊防粘"], ["安琪酵母", "30g(批次)", "-", "发酵膨松"], ["安琪泡打粉", "30g(批次)", "-", "辅助膨松"], ["吉士粉", "30g(批次)", "-", "奶香上色金黄"], ["王守义五香粉", "10-20g(批次)", "-", "五香基底"], ["食盐", "30g(批次)", "-", "基础咸味"], ["葵花红梅味精", "10-20g(批次)", "-", "提鲜"], ["肉馅/酱料", "适量", "-", "夹馅"]], "SOP": ["富强粉+调和油+鸡蛋+酵母+温水搅拌成基础糊", "加泡打粉+五香粉+食盐+味精+吉士粉，继续深层搅拌", "分批次加入面包粉2.5斤，高强度搅拌至无颗粒细腻糊状", "静置发酵：夏天30分钟 / 冬天1小时", "多孔汉堡机模具刷薄油，注入第一层面糊至听见\"嗞啦\"定型声", "加蛋+肉馅/酱料，再盖一层面糊封顶", "两面煎至焦糖金黄色，铲刀挑起出锅", "刷蒜蓉辣酱，纸袋打包"], "毛利": "成本¥1.50/个(含面糊+鸡蛋+肉馅) → 零售¥5.00 → 毛利70.0%", "设备": "多孔商用鸡蛋汉堡机(燃气/电动)¥400-800 / 不锈钢面糊漏斗¥30-60 / 专用铲刀¥20-40, 共计约¥1,300", "替代": "吉士粉→奶粉+姜黄粉(缺奶香上色) / 安琪酵母→老面种(需调整发酵时间)", "变体": "玉米鸡蛋汉堡/芝士鸡蛋汉堡/辣条鸡蛋汉堡", "常见问题": "Q:外皮不脆里面不松软? A:发酵时间不够或火力太小,夏天必须静置30分钟以上,中高火煎制", "建议图片描述": "A row of perfectly round, golden-brown Chinese egg burgers (Jidan Hanbao) cooking in a multi-hole commercial cast iron griddle. The crispy edges are slightly oily and bubbling, showing a fluffy, sponge-like soft texture on the inside where it cut open. Fresh green onions and hints of savory meat filling are visible. Warm, bright street food stall lighting, extreme close-up macro shot capturing the sizzling oily surface and golden texture, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "下午四点半的校门口，推车摊位前已经围满了解馋的学生和刚下班的年轻人。多孔汉堡机上的圆孔滋滋作响，面糊在热油的催化下迅速膨胀。\n\n两面煎至金黄的鸡蛋汉堡颤巍巍地被铲刀挑起。由于在面糊里加入了吉士粉与面包粉，外皮呈现出一种极其纯正的焦糖金黄色，边缘微微泛着酥脆的油光。一口咬下去，外壳发出细微的咔嚓声，里面却像海绵般吸足了蛋液与五香肉馅的咸香，松软多汁且完全不粘牙，带着温热的麦香，几口就能消灭一个。", "仪式感": ["模具刷上一层薄薄的调和油，注入第一层面糊时，必须听到清脆的\"嗞啦\"声，确保外皮迅速定型起酥", "出锅后用纸袋包裹，趁着热气在汉堡表面刷上一层特制蒜蓉辣酱，借着余热让酱香二次散发"], "场景标签": ["零食", "夜宵", "佐餐"]}, "CD-013": {"配方": [["鸡柳", "1000g(批次)", "-", "主料，切条锁水"], ["乐宅客腌料", "70g(批次)", "-", "入味锁水核心"], ["水", "500g(批次)", "-", "抓拌吸收介质"], ["玉米淀粉", "适量", "-", "裹粉第一层锁水"], ["面包糠", "足量", "-", "糠衣外壳，酥脆来源"], ["孜然粉/辣椒面", "适量", "-", "出锅复配调料"]], "SOP": ["鸡柳1000g+腌料70g+水500g，手抓搅拌5分钟至水分完全被肉质纤维吸收", "冰箱冷藏腌制8小时", "出摊前取出，加玉米淀粉抓拌均匀", "投入面包糠盆中手工抓拌，使表面完全码上糠衣，手掌轻压贴合", "顾客点单现场称重(约150g/份)入热油", "炸3分钟至金黄，捞出控油网用力颠勺三次沥油", "撒孜然粉+辣椒面，装袋出餐"], "毛利": "成本¥3.20/份(150g) → 零售¥10.00 → 毛利68.0%", "设备": "商用双通大功率电炸炉¥800-1200 / 不锈钢裹粉盆¥50-100 / 控油网勺¥30-60 / 台式电子秤¥80-150, 共计约¥1,500", "替代": "乐宅客腌料→奥尔良腌料+少量小苏打(风味不同) / 面包糠→薯片碎(酥脆度略降)", "变体": "麻辣鸡柳/椒盐鸡柳/柠檬鸡柳", "常见问题": "Q:炸出来外壳脱落? A:面包糠没压实,或下锅时裹粉未回潮定型,需手掌轻压再静置2分钟", "建议图片描述": "A close-up shot of golden-brown crispy fried chicken tenders (Ji Liu) piled high inside a retro paper snack bag, resting on a clean street food stall counter. A few pieces are perfectly broken in half, revealing the steaming, juicy white chicken meat inside under a super crunchy breadcrumb crust. Light sprinkles of chili powder and cumin are visible on the surface. Warm glowing night market ambient lighting, beautiful side backlight highlighting the crispy texture and rising steam, shallow depth of field, high-resolution action food photography, no text, no recipe.", "美食故事": "下午五点半的夜市刚刚开张，油锅在燃气灶的催化下升起微微的热浪。放学的小学生和下班的年轻人瞬间将小小的推车摊位围得水泄不通。\n\n称好重量的鸡柳被顺势滑入滚烫的油锅中，瞬间激起密集的清脆响声，面包糠在外油的逼迫下迅速定型变硬。只需3分钟，一锅金黄酥脆的鸡柳便破油而出，当头撒上一把孜然粉与辣椒面，装进纸袋里还带着烫手的温度。用竹签挑起一根塞进嘴里，咔嚓一声， , "A料（大葱1kg+香菜500g+生姜500g+干花椒250g+小米辣1kg+瑰露酒80g+鸡精200g+60°白酒150g+盐250g+十三香1盒+胡椒面30g+料酒150g+酱油1500g+老抽2550g+清水4kg）混合", "鸭入A料腌制12小时", "竹签十字固定鸭体成板状，强风吹晾24小时脱水", "B料（鲜汤8kg+盐250g+鸡精300g+小米辣500g+青花椒1袋+猪油100g+鸡油10g+糖色150g+红曲米80g+小葱50g+生姜50g+香菜100g+辣妹子酱1斤+排骨酱1斤）烧沸", "C料（八角20g+山奈25g+桂皮15g+小茴香15g+香果3个+香茅10g+香叶10g）用色拉油2kg炒香", "C料入B卤桶，投风干鸭板，小火卤45分钟", "捞出悬挂通风处晾干表面浮油，使卤汁回缩至干香挂味", "整只售卖或手撕出餐"], "毛利": "成本¥18.50/只 → 零售¥45.00 → 毛利58.9%", "设备": "大容量定制风干柜¥1500-2000 / 150L商用卤水桶¥800-1200 / 重型燃气灶¥1500-2500 / 不锈钢扁平托盘¥200-400, 共计约¥5,500", "替代": "水盆鸭→白条鸭(肉质偏软) / 瑰露酒→玫瑰露酒(风味接近) / 60°白酒→二锅头(成本更低)", "变体": "麻辣酱板鸭/茶香酱板鸭/五香酱板鸭", "常见问题": "Q:鸭肉不够干香紧实? A:风干时间不够,须强风吹足24小时使脱水到位再卤制", "建议图片描述": "An authentic Chinese spicy Hunan soy-sauce pressed duck (Jiang Ban Yu) displayed flat on a clean wooden chopping board. The duck skin is a deep, glossy dark brownish-red, showing a dry, tight, and highly textured surface from air-drying. Flakes of dried chili and Sichuan peppercorns are subtly speckled on the skin. Mood night market stall background with dim warm spotlights, dramatic side angle emphasizing the lean and flat profile of the duck, high-resolution professional culinary photography, no text, no recipe.", "美食故事": "深夜的熟食档前，那一排排悬挂着、皮肤暗红油亮的酱板鸭总是最引人注目的焦点。懂行的老饕绝不让老板用刀切，而是执意整只打包带走，回家用手撕着吃。\n\n经过24小时强风脱水的鸭肉紧实到了极致，高粱酒和瑰露酒的醇香已经深深渗入骨髓。撕下一块鸭脯肉，肉质呈干香的丝状，麻辣辣妹子酱与排骨酱的浓郁酱香逐层递进，伴随着青红花椒的阵阵酥麻。干香、麻辣、极具嚼劲，是深夜佐酒的无上美味。", "仪式感": ["压平去油后的鸭胚必须用竹签十字交叉牢牢固定，确保风干和卤制过程中鸭体受热均匀", "卤制出锅后不可立即售卖，需悬挂在通风处自然晾干表面浮油，让卤汁往肉理深处回缩"], "场景标签": ["佐餐", "下酒", "休闲"]}, "CD-019": {"配方": [["盐", "390g(批次)", "-", "基咸，干粉主体"], ["厨帮鸡粉", "80g(批次)", "-", "鲜味核心"], ["味精", "50g(批次)", "-", "提鲜"], ["白糖", "40g(批次)", "-", "回甘调和"], ["美味粉", "28g(批次)", "-", "复合增鲜"], ["炒饭核心粉", "3g/份", "-", "出餐用量"], ["味事达酱油", "6g/份", "-", "咸鲜调色"], ["蚝油", "6g/份", "-", "增鲜挂味"], ["大米+鸡蛋", "适量", "-", "基础主料"], ["衍生配料", "依品种", "-", "榨菜/青椒/腊肉/玉米等"]], "SOP": ["预制干粉：盐390g+鸡粉80g+味精50g+白糖40g+美味粉28g", "盆中干拌2-3分钟至完全均匀，装袋密封备用", "出餐：米饭下锅大火宽油炒散", "撒核心调味粉3g，沿锅边淋味事达酱油6g+蚝油6g", "翻匀激出酱焦香锅气", "依衍生品种加相应配料（榨菜/肉丝/玉米/虾仁等）"], "毛利": "成本¥1.80/份(基础蛋炒饭) → 零售¥8.00 → 毛利77.5%", "设备": "大火力商用单头炒灶¥800-1500 / 熟铁炒锅¥80-150 / 保温饭锅¥200-400 / 不锈钢调料盒¥50-80, 共计约¥1,800", "替代": "厨帮鸡粉→家乐鸡粉(鲜度接近) / 美味粉→鸡汁+干贝素(成本略高)", "变体": "榨菜肉丝炒饭/青椒肉丝炒饭/扬州炒饭/腊肉炒饭/鱿鱼炒饭", "常见问题": "Q:炒饭粘锅水塌? A:米饭太湿或火力不够,必须用隔夜饭或冷透的米饭,大火宽油猛炒", "建议图片描述": "A high-action shot of a professional chef tossing a wok of golden fried rice over a blazing hot commercial stove. Individual rice grains are visibly separate, glistening with soy sauce, scrambled egg, and chopped scallions. Intense steaming wok hei (breath of the wok) smoke rises dramatically, illuminated by the powerful gas flame. High contrast professional kitchen lighting, extreme close-up action shot, high-resolution culinary photography, no text, no recipe.", "美食故事": "晚上十点的十字路口，街头炒饭的摊位前永远围着夜班归来的年轻人。风机轰鸣，铁锅与铁铲高频碰撞，发出节奏感极强的哐哐声。\n\n一碗冷米饭下锅，在宽油旺火中被炒得粒粒分散。老板熟练地撒入3克核心调味粉，激发出纯正的咸鲜，随后沿锅边淋入蚝油与酱油。刹那间，一股浓烈的酱焦香（锅气）混合着米香扑面而来。盛在纸盒里的炒饭粒粒油亮发黄，包裹着细碎的蛋花，每一口都是极其标准的咸鲜适口、干爽筋道。", "仪式感": ["五味干粉必须单独在盆中干拌足3分钟，确保微量的美味粉和白糖均匀分布", "沿锅边淋入蚝油酱油的瞬间触发锅气，这是街头炒饭独有的焦香灵魂", "酱油与蚝油严禁直接淋在米饭上，必须在快出锅时沿滚烫的铁锅边缘泼入，利用高温瞬间气化激发出铁锅焦香"], "场景标签": ["佐餐", "夜宵"]}, "CD-020": {"配方": [["冰糖", "1斤(批次)", "-", "中火熬化，禁止搅拌"], ["清水", "1斤(批次)", "-", "熬糖基底"], ["新鲜金桔", "16颗(批次)", "-", "对半切开，充分释放果汁"], ["柠檬", "1个(批次)", "-", "洗净切薄片"], ["青柠(可选)", "16颗", "-", "替代金桔"]], "SOP": ["冰糖1斤+清水1斤入锅，中火熬化，期间禁止搅拌", "待冰糖完全熬化后彻底放凉备用", "新鲜金桔对半切开，柠檬洗净切均匀薄片", "放凉糖水中加入金桔16颗+柠檬片10片", "轻压金桔让果肉核心果汁与糖水融合", "入密封容器，冰箱冷藏腌制保存（可保存一周）", "出餐时依比例兑水或加冰块快速出品"], "毛利": "成本¥1.20/杯(400ml) → 零售¥6.00 → 毛利80.0%", "设备": "不锈钢冰糖熬煮锅¥100-200 / 商用冷藏柜¥800-1500 / 切片器¥20-40 / 果汁密封罐¥30-50, 共计约¥1,200", "替代": "冰糖→白砂糖(甜味不纯净) / 金桔→青柠(风味偏酸)", "变体": "蜂蜜柠檬糖水/百香果糖水/薄荷青柠糖水", "常见问题": "Q:糖水浑浊返砂? A:熬煮时搅拌了,中火熬化期间绝对不要搅动,自然融化最纯净", "建议图片描述": "A crystal-clear glass filled with a refreshing Chinese iced calamansi and lemon sweet water (Jinjv Ningmeng Tangshui). Plump green calamansi halves and vibrant yellow lemon slices are layers inside with lots of crushed ice cubes. Tiny condensation droplets are running down the outside of the glass. Bright summer daylight setting, close-up shot capturing the translucent texture of the liquid and fresh fruit rinds, soft bokeh background, high-resolution beverage photography, no text, no recipe.", "美食故事": "夏日正午的步行街，滚烫的柏油马路让人汗流浃背。火锅店或烧烤摊旁的小饮品档口，打扮时髦的姑娘正接过一杯盛满碎冰的饮料。\n\n清澈的冰糖水里飘着翠绿的金桔和鲜黄的柠檬片，视觉上便降温了三分。因为是用纯冰糖中火静置熬化，糖浆没有任何杂质，甜感清澈而高级，绝不粘喉。", "仪式感": ["熬煮冰糖水时切记不可用勺子搅拌，任其在中火下自然融化，保证糖浆冷凉后不返砂不浑浊", "金桔对半切开后，入桶前需用洁净压汁器轻压一下，让果肉核心的微量果汁瞬间与冰糖水融合"], "场景标签": ["休闲", "佐餐", "解腻"]}, "CD-021": {"配方": [["冰糖", "1斤(批次)", "-", "中火熬化，禁止搅拌"], ["清水", "1斤(批次)", "-", "熬糖基底"], ["新鲜草莓", "适量", "-", "纵向一切四瓣，保持块状"], ["草莓酱", "30g(批次)", "-", "二次起香提色"]], "SOP": ["冰糖1斤+清水1斤入锅，中火熬化，禁止搅拌", "熬化后放凉备用", "新鲜草莓洗净，纵向一切四瓣", "草莓块投入放凉的基底糖水中，开火煮2分钟定型控熟", "加草莓酱30g起香提色，关火彻底放凉", "装入洁净密封罐，冰箱冷藏保存（可保存一周）", "出餐时用高透玻璃杯盛装"], "毛利": "成本¥1.60/杯(400ml) → 零售¥8.00 → 毛利80.0%", "设备": "不锈钢轻型熬煮锅¥100-200 / 果蔬清洗沥水台¥100-200 / 台式保鲜冷藏柜¥800-1200, 共计约¥1,300", "替代": "草莓→树莓或蓝莓(颜色风味不同) / 草莓酱→自熬草莓浓缩汁(成本更低)", "变体": "水晶黄桃糖水/水晶荔枝糖水/水晶杨梅糖水", "常见问题": "Q:草莓块煮烂了形态软塌? A:煮制时间超过2分钟或火力太大,严格控制在2分钟即离火加酱降温", "建议图片描述": "A premium crystal-clear glass bowl filled with traditional Chinese strawberry dessert soup (Shuijing Caomei Tangshui). Large, perfectly cut quarters of bright red strawberries are floating in a fully translucent, glistening pink-tinted clear syrup with glints of light reflecting off the surface. Elegant cafe interior background with a soft warm blur, dramatic macro shot capturing the plump strawberry seeds and wet texture, high-resolution dessert culinary photography, no text, no recipe.", "美食故事": "甜品店的明亮橱窗里，一排排玻璃罐盛装的水晶草莓糖水在灯光下泛着梦幻般的粉红色。放学的小女孩扯着妈妈的衣角，眼睛直勾勾地盯着那罐红艳艳的果肉。\n\n勺子舀下去，冰镇过的草莓块依然保持着规整的四瓣形态。纯冰糖熬制的糖水通透得像水晶，在优质草莓酱的晕染下呈现出清澈的玛瑙红。", "仪式感": ["草莓块入汤煮制必须严格限定在2分钟，时间一到立刻加入冷调草莓酱降温", "出品时选用高透玻璃杯，勺子舀起时带出一块完整草莓与一勺清亮红汤"], "场景标签": ["休闲", "零食", "解腻"]}, "CD-022": {"配方": [["鸡油", "200g(批次)", "-", "底油金黄油亮"], ["海南黄灯笼椒酱", "250g(批次)", "-", "酸辣核心，金黄汤色"], ["泡酸菜", "200g(批次)", "-", "酸菜底味"], ["普通酸菜", "400g(批次)", "-", "酸菜量主体"], ["野山椒", "300g(批次)", "-", "天然酸辣"], ["泡姜", "400g(批次)", "-", "姜香酸辣基底"], ["香菜", "100g(批次)", "-", "异香提味"], ["洋葱", "50g(批次)", "-", "增甜底香"], ["蒜仔", "50g(批次)", "-", "蒜香底"], ["预制高汤", "30斤(批次)", "-", "大火烧开转中火熬制"]], "SOP": ["锅烧热加鸡油200g，烧至微热", "下海南黄灯笼椒酱250g+酸菜大火翻炒", "投入野山椒300g+泡姜400g+香菜100g+洋葱50g+蒜仔50g，持续炒至高强度爆香", "倒入预制高汤30斤，大火烧开", "转中火持续熬制30分钟，金黄素完全释放", "细漏勺过滤掉所有残渣", "落成标准商品级金汤约25斤"], "毛利": "成本¥2.50/份(终端菜品用金汤500ml折算)", "设备": "大容量商用汤桶¥500-800 / 重型燃气灶¥1500-2500 / 细密漏勺¥50-100, 共计约¥2,500", "替代": "鸡油→猪油+色拉油(金汤色泽变暗) / 黄灯笼椒酱→黄剁椒+野山椒汁(风味稍弱)", "变体": "微辣金汤/番茄金汤/菌菇金汤", "常见问题": "Q:汤色不黄? A:黄灯笼椒酱炒制不足或鸡油量不够,需大火爆香充分释放金黄素", "建议图片描述": "A close-up shot of a rich, bubbling gourmet golden sour broth (Jin Tang) cooking in a large professional stainless steel pot. The surface of the boiling soup is a bright, vibrant opaque yellow color with golden chicken oil droplets glistening on top. Soft wisps of spicy and sour scented steam naturally rise up. Clean commercial kitchen setting background with soft lighting, side shot focusing on the swirling motion and texture of the broth, high-resolution culinary photography, no text, no recipe.", "美食故事": "金汤系列菜品在川湘菜馆里一直是点单率最高的招牌之一。那黄澄澄、金灿灿的汤底，无论是煮鱼片还是涮蔬菜都自带高级感。\n\n这口金汤的核心秘密，藏在大火爆香黄灯笼椒酱与鸡油慢熬的30分钟里。鸡油提供了纯净的动物脂香，黄灯笼椒酱贡献了独特的金黄色泽与鲜辣，双重酸菜和野山椒构建了霸道的酸辣底味。", "仪式感": ["黄灯笼椒酱必须与鸡油在大火中充分爆香，直到油色由白转金，香味冲出才可下高汤", "过滤时使用细密漏勺轻压残渣，确保金黄素完全释放又不使汤浑浊"], "场景标签": ["佐餐", "下酒"]}, "CD-023": {"配方": [["肥牛片", "250g", "-", "沸水焯至断生"], ["金针菇", "150g", "-", "焯水垫底，脆爽口感"], ["青笋条", "100g", "-", "焯水垫底，脆嫩清爽"], ["木耳", "50g", "-", "焯水垫底，爽脆口"], ["预制金汤", "1.4斤", "-", "核心酸辣底汤"], ["青杭椒圈", "20g", "-", "激香点缀"], ["红杭椒圈", "20g", "-", "激香点缀"], ["鸡粉", "5g", "-", "提鲜"], ["味精", "5g", "-", "提鲜"], ["鸡汁", "5g", "-", "增鲜"], ["自醋", "15g", "-", "酸味核心"], ["盐", "适量", "-", "调咸"], ["色拉油", "适量", "-", "炸椒圈用"], ["食盐", "2调料勺", "-", "焯水用"]], "SOP": ["锅中烧水加2调料勺盐，依次焯木耳50g+金针菇150g+青笋条100g，控干垫入盛器底部", "肥牛片250g沸水焯至断生变色（八成熟），立刻捞出控干，码放配菜上", "锅中倒入预制金汤1.4斤+鸡粉5g+味精5g+鸡汁5g+自醋15g+盐适量，大火烧开", "金汤浇在肥牛片与配菜上", "另起锅色拉油烧热，下青红杭椒圈各20g煸香", "连油带椒圈趁热浇在肥牛表面，发出\"嗞啦\"声即可上 出来的霸道辣香，黏附在空气里，走过路过的人根本无处可逃。\n\n这里的鸭脖，走的是极致的\"骨肉分离\"路线。因为足足卤够了两个小时，扯下一节送入嘴里，根本不需要费力去啃，轻轻一抿，紧实又带点微纤维感的鸭肉便成条脱落。最绝的是那20分钟的静置浸泡，麻、辣、鲜、咸和十一味中草药的复配香气，早已顺着骨缝透进了骨髓深处。", "仪式感": ["高脂深卤：2000g高油脂比例是该配方灵魂，油脂锁住干辣椒与白扣、砂仁的脂溶性香气，在两小时慢火中压进肉质纤维", "天然红曲定色：1000g清水将50g红曲米单独熬制成定色水，鸭脖色泽深红亮堂，久置不发黑"], "场景标签": ["休闲", "夜宵", "下酒"]}, "CD-029": {"配方": [["菜油", "500g(批次)", "-", "红油基底"], ["粗辣椒面", "75g(批次)", "-", "170℃时下入"], ["八角", "6g(批次)", "-", "红油香料"], ["桂皮", "5g(批次)", "-", "红油香料"], ["草果", "1个(批次)", "-", "红油香料"], ["香叶", "1g(批次)", "-", "红油香料"], ["小茴香", "3g(批次)", "-", "红油香料"], ["花椒", "3g(批次)", "-", "红油香料"], ["大葱", "50g(批次)", "-", "蔬菜香料组"], ["洋葱", "50g(批次)", "-", "蔬菜香料组"], ["姜片", "30g(批次)", "-", "蔬菜香料组"], ["香菜", "10g(批次)", "-", "蔬菜香料组"], ["芝麻", "适量", "-", "190℃时激香"], ["香醋", "适量", "-", "顺锅淋入激香"], ["白酒", "适量", "-", "挥发带出香气"], ["芝麻酱", "80g(批次)", "-", "酱料底座挂汁"], ["生抽", "30g(批次)", "-", "酱料稀释调咸"], ["专用红油", "130g(批次)", "-", "酱料乳化"], ["蚝油", "20g(批次)", "-", "酱料提鲜"], ["番茄沙司", "10g(批次)", "-", "柔和芝麻酱糊嘴感"], ["白糖", "8g(批次)", "-", "回甘调和"], ["鸡精", "6g(酱料)+8g(撒料)", "-", "提鲜"], ["味精", "2g(酱料)+8g(撒料)", "-", "提鲜"], ["辣椒酱", "25g(批次)", "-", "撒料辣度主味"], ["孜然", "20g(批次)", "-", "撒料增香"], ["鸡粉", "8g(批次)", "-", "撒料鲜咸质感"], ["味素", "2g(批次)", "-", "撒料增鲜"], ["核桃酥", "20g(批次)", "-", "撒料坚果酥脆（核心）"], ["花生粉", "5g(批次)", "-", "撒料增脆"], ["熟芝麻", "8g(批次)", "-", "撒料点缀"], ["红薯苕皮", "1张/份", "-", "主料基体"], ["酸萝卜/折耳根等", "适量", "-", "裹入小料"]], "SOP": ["【红油】菜油500g烧熟关火，下大葱50g+洋葱50g+姜片30g+香菜10g炸香", "【红油】投入泡好的香料（八角+桂皮+草果+香叶+小茴香+花椒），小火炸干变黄逼出香气", "【红油】捞出所有香料蔬菜残渣关火，油温190℃下芝麻激香", "【红油】油温降至170℃下粗辣椒面75g，顺锅淋香醋+白酒激香，盖盖闷凉隔夜使用", "【酱料】芝麻酱80g+蚝油20g+番茄沙司10g+白糖8g+鸡精6g+味精2g+生抽30g入容器", "【酱料】加专用红油130g彻底搅拌均匀至挂汁稠度", "【撒料】核桃酥20g压碎+花生粉5g+熟芝麻8g+孜然20g+鸡粉8g+味精8g+味素2g+辣椒酱25g混合", "【出餐】红薯苕皮上炭烤炉或铁板，两面烤至鼓泡表皮酥脆", "【出餐】刷一层专用酱料，裹入酸萝卜/折耳根等小料，折叠卷起", "【出餐】疯狂撒上专用撒料，核桃酥花生粉遇热油脂香爆发"], "毛利": "成本¥1.80/张(素苕皮) → 零售¥7-10(视裹料) → 毛利74.2-82.0%", "设备": "商用无烟木炭/燃气烧烤炉(长条形)¥400-600 / 全套不锈钢调料盒¥80-120 / 加厚不锈钢刮刀¥30-50, 共计约¥1,200", "替代": "核桃酥→桃酥或花生酥(接近) / 红薯苕皮→普通粉皮(口感不对) / 番茄沙司→红甜椒粉+水(调色不调味)", "变体": "烤苕皮夹肥肠/烤苕皮夹牛肉/烤苕皮夹辣条", "常见问题": "Q:苕皮烤不鼓泡? A:火不够旺或苕皮太干,炭火要旺,苕皮表面可轻刷水。Q:红油发苦? A:香料炸过头或油温太高下辣椒面,严格按190→170两段温度控温", "建议图片描述": "A cinematic, close-up macro shot of a classic Chongqing-style grilled Shaopi (sweet potato starch skin) on a smoking barbecue grill. The starch skin is bubbles up, beautifully blistered, and charred with perfect grill marks, gleaming under a thick, rich layer of signature red chili sauce and sesame paste glaze. Generous amounts of coarse-crushed walnuts, peanut powder, toasted sesame seeds, and chopped scallions are showered on top. Puffs of aromatic wood smoke swirl around the food. Dark night-market background with warm, gritty food stall illumination, high-end food documentary photography, razor-sharp focus on the blistered crispy texture, no text, no recipe.", "美食故事": "烤苕皮的精髓，全在出炉前那一记闷香。浸润了葱姜洋葱、历经190℃和170℃两段精确降温激作出来的专用红油，混合着醇厚的芝麻酱与一丝若隐若现的番茄酸甜，牢牢挂在烤到通体鼓泡、两面微焦硬挺的红薯皮上。\n\n一口咬下去，外皮是带点韧劲的脆，内里是黏糯软糊的糯。然而最让人惊艳的，是原稿配方里神来之笔的\"核桃酥\"与\"花生粉\"撒料。当滚烫的油脂遇到压碎的核桃酥，糕点的酥脆和坚果的熟香在舌尖瞬间沙化开来，配合酸萝卜的爽脆，多重口感排山倒海。", "仪式感": ["红油熬制严格遵循190℃下芝麻→170℃下辣椒面的双温阶梯工艺，淋香醋白酒借挥发激香", "专用撒料中核桃酥与花生粉需现压碎现用，遇热苕皮油脂瞬间沙化，产生坚果高香的致命成瘾性"], "场景标签": ["零食", "夜宵", "下酒"]}, "CD-030": {"配方": [["大茴香", "基数10", "-", "香料粉主体"], ["小茴香", "基数10", "-", "香料粉主体"], ["罗汉果", "基数0.3", "-", "回甘"], ["千里香", "基数1", "-", "异香"], ["桂皮", "基数3.5", "-", "复合香"], ["甘草", "基数10", "-", "回甘调和"], ["花椒", "基数2", "-", "麻香底"], ["白芷", "基数2", "-", "去膻增香"], ["山奈", "基数2", "-", "增香"], ["干姜", "基数2", "-", "姜香"], ["豆蔻", "基数2", "-", "去腥增香"], ["丁香", "基数1.5", "-", "尖香点缀"], ["香砂", "基数2", "-", "增香"], ["香叶", "基数1", "-", "清香"], ["白寇", "基数1.2", "-", "去腥"], ["肉蔻", "基数0.9", "-", "增香"], ["陈皮", "基数1.2", "-", "果香解腻"], ["木香", "基数0.9", "-", "异香"], ["砂仁", "基数0.9", "-", "增香去腥"], ["草果", "基数2", "-", "去腥增香"], ["白胡椒", "基数0.3", "-", "辛香"], ["荜拨", "基数0.3", "-", "去腥"], ["白糖", "75g(10斤版)", "-", "回甘调和"], ["盐", "90g(10斤版)", "-", "基咸"], ["味精", "25g(10斤版)", "-", "提鲜"], ["葱", "40g(10斤版)", "-", "腌制去腥"], ["姜", "40g(10斤版)", "-", "腌制去腥"], ["蒜", "40g(10斤版)", "-", "腌制增香"], ["色拉油", "5份(底油)", "-", "油炸基底"], ["棕榈油", "1份(底油)", "-", "增稠起酥"]], "SOP": ["预制香料粉：22味中草药按比例（大茴香10:小茴香10:罗汉果0.3:千里香1:桂皮3.5:甘草10:花椒2:白芷2:山奈2:干姜2:豆蔻2:丁香1.5:香砂2:香叶1:白寇1.2:肉蔻0.9:陈皮1.2:木香0.9:砂仁0.9:草果2:白胡椒0.3:荜拨0.3）粉碎成颗粒状", "以10斤鸭子为基准：水975g+腌料75g入桶搅匀，大火烧开转小火煮1小时（不加盖）", "细纱布过滤废渣，料水置凉", "凉料水中加蒜40g+葱40g+姜40g+糖75g+盐90g+味精25g搅匀", "鸭子洗净，入料水腌制", "底油：色拉油5份+棕榈油1份混合", "腌制好的鸭子入油锅炸制至色泽金黄，口感酥脆"], "毛利": "成本待按实际出成率核算（含整鸭+22味香料粉+油炸损耗）", "设备": "商用油炸炉或大型炸锅 / 熬料桶 / 细纱布过滤网", "替代": "棕榈油→起酥油(效果接近但成本略高) / 色拉油→大豆油(需调整比例)", "变体": "茶油鸭腿/茶油鸭翅/茶油鸭锁骨", "常见问题": "Q:鸭子炸出来颜色偏差? A:油温控制不当或腌制时间不足。Q:味道不入骨? A:腌制时间不够,需确保料水完全渗透", "建议图片描述": "A close-up shot of a whole crispy golden-brown Beijing-style tea-oil duck hanging in a display window of a traditional Chinese delicatessen. The duck skin is perfectly fried to a glossy mahogany-golden color with a thin sheen of aromatic oil, garnished with scattered whole spices. Warm, inviting night market stall ambiance, soft dramatic lighting, high-resolution culinary portrait photography, no text, no recipe.", "美食故事": "老北京茶油鸭的招牌前，排队的人永远不比烤鸭店少。那刚从油锅捞出的鸭子，通体呈现出诱人的焦糖色，22味中草药在高温油炸的催化下，释放出霸道而醇厚的复合香气。\n\n夹起一块炸得酥脆的鸭皮送入口中，外壳咔嚓碎裂，皮下脂肪已经炸透。而藏在中草药料水里腌制入味的鸭肉，咸鲜中带着甘草和罗汉果的清甜回甘，大茴香与小茴香的暖香、桂皮和陈皮的果香、花椒和白芷的辛麻层层递进。", "仪式感": ["22味中草药需严格按基数比例粉碎成颗粒状，保证每批料水风味一致", "底油必须按色拉油5:棕榈油1的比例混合，棕榈油提供酥脆口感，色拉油保证色泽金黄透亮"], "场景标签": ["佐餐", "下酒", "休闲"]}, "CD-031": {"配方": [["海鲜酱", "500g", "-", "甜酱基底，主味"], ["柱侯酱", "500g", "-", "复合酱香"], ["白糖", "300g", "-", "回甘调和"], ["蚝油", "200g", "-", "提鲜挂汁"], ["南乳", "75g", "-", "腐乳底香，独特风味"], ["美极鲜酱油", "75g", "-", "鲜咸调色"], ["芝麻油", "75g", "-", "尾香提味"], ["花生酱", "75g", "-", "增稠坚果香"], ["腐乳", "75g", "-", "复合发酵香"], ["食用植物油", "10g", "-", "爆香底油"], ["味精", "20g", "-", "提鲜"], ["鸡精", "20g", "-", "增鲜"], ["蒜茸", "10g", "-", "蒜香底味"], ["红葱头茸", "10g", "-", "葱香底味"], ["姜蓉", "10g", "-", "姜香去腥"]], "SOP": ["海鲜酱500g+柱侯酱500g+白糖300g+蚝油200g+南乳75g+腐乳75g+芝麻油75g+花生酱75g+美极鲜酱油75g混合搅拌成糊状", "植物油10g入锅大火烧热，下蒜茸10g+红葱头茸10g+姜蓉10g+味精20g+鸡精20g爆香", "转慢火，加入酱类拌成的糊，搅拌均匀", "慢火煮5分钟至不粘炒勺为准", "起锅用干燥洁净器皿盛装，常温密封保存"], "毛利": "成本约¥1.00/份(30ml蘸料折算) → 可作片皮类产品配套蘸酱", "设备": "不锈钢炒锅 / 搅拌盆 / 密封罐", "替代": "海鲜酱→柱侯酱+甜面酱调(风味不同) / 南乳→红腐乳+少量曲酒(接近)", "变体": "烤鸭酱/烧鹅酱/蜜汁叉烧酱", "常见问题": "Q:酱汁容易变质? A:炒制时间不足或器皿未擦干,煮够5分钟至不粘勺,确保器皿干燥洁净", "建议图片描述": "A close-up of a rich, dark reddish-brown Chinese roast suckling pig sauce (Kaoruzhu Jiang) in a ceramic bowl, thick and glossy texture with visible specks of fermented bean paste and garlic. Warm professional kitchen lighting, macro shot capturing the smooth, sticky sauce surface, high-resolution food photography, no text, no recipe.", "美食故事": "广式烧腊档口前，刚出炉的烤乳猪通体油亮酥脆，最让人念念不忘的不是脆皮本身，而是那碟深棕浓稠、复合着六种酱料精华的蘸酱。\n\n海鲜酱与柱侯酱提供了甜咸交织的丰厚基底，南乳和腐乳在慢火熬煮中释放出独特的发酵醇香，蚝油与美极鲜酱油把鲜度拉满，最后以蒜茸和红葱头的爆香收尾。", "仪式感": ["六种酱料混合成糊后再与爆香料头合炒，确保香体与酱体层次分明", "煮至不粘炒勺为出锅标准，保证水分完全收干，密封耐储"], "场景标签": ["佐餐", "酱料"]}, "CD-032": {"配方": [["五花肉", "5kg(批次)", "-", "主料，切大块"], ["八角", "500g(香料粉批次)", "-", "君料"], ["山奈", "150g(香料粉批次)", "-", "增香"], ["丁香", "100g(香料粉批次)", "-", "尖香点缀"], ["香叶", "500g(香料粉批次)", "-", "清香"], ["白蔻", "400g(香料粉批次)", "-", "去腥增香"], ["草果", "500g(香料粉批次)", "-", "去腥增香"], ["桂皮", "300g(香料粉批次)", "-", "复合香"], ["干姜", "300g(香料粉批次)", "-", "姜香去腥"], ["排草", "350g(香料粉批次)", "-", "增香"], ["甜面酱", "适量", "-", "腌制酱香基底"], ["辣椒酱", "适量", "-", "蘸料配餐"]], "SOP": ["预制香料粉：八角500g+山奈150g+丁香100g+香叶500g+白蔻400g+草果500g+桂皮300g+干姜300g+排草350g打碎混合", "五花肉洗净切大块，加香料粉+甜面酱抓匀，腌渍3-4小时", "泥瓦缸内放点燃无烟木炭，腌好五花肉用钩子挂好，吊入缸内", "先微火烤2-3小时，然后转大火烤30分钟", "烤好后继续放缸内，木炭保持微火保温", "客人点菜时取肉切厚0.6cm大块，入烧烫铁盘加热2分钟", "配辣椒酱上桌"], "毛利": "成本约¥10-12/份(含五花肉+香料+炭火损耗, 250g/份) → 零售¥28-38 → 毛利58-68%", "设备": "泥瓦缸烤炉¥300-600 / 铁钩 / 烧烫铁盘¥50-100 / 无烟木炭", "替代": "泥瓦缸→不锈钢缸式烤炉(保温性略差) / 甜面酱→海鲜酱(风味偏甜)", "变体": "烤五花肉配生菜/蜜汁烤五花/香辣烤五花", "常见问题": "Q:肉烤出来太干柴? A:微火烤制时间不足或火太大,先微火2-3小时慢烤锁汁再大火上色。Q:香料味过重? A:香料粉用量过多,5kg肉配20-30g香料粉即可", "建议图片描述": "A close-up shot of thick slices of charcoal-roasted Chinese pork belly (Kao Wu Hua Rou) sizzling on a hot cast iron plate. The meat shows perfect layers of crispy dark-brown skin, tender fat, and juicy lean meat, garnished with a side of red chili dipping sauce. Rustic clay pot kiln background with glowing charcoal embers visible, warm smoky evening lighting, high-resolution food photography, no text, no recipe.", "美食故事": "街角的泥瓦缸烤炉前，炭火的红光映在老板脸上。刚出炉的五花肉在铁盘上滋滋作响，油脂在高温下跳动，香气顺着烟气飘散。\n\n夹起一片0.6厘米厚的烤五花，外皮焦脆，肥肉部分已经烤到半透明，入口即化却不腻口。瘦肉经过3小时微火慢烤，汁水完全锁住，八味香料粉的复合香气从肉理深处层层释放。", "仪式感": ["泥瓦缸烤制全程先微火2-3小时锁汁再大火30分钟上色，两段式控火是外焦里嫩的关键", "客人点菜时现切0.6cm厚片入铁盘加热2分钟上桌，保持铁盘温度让油脂持续跳动"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-033": {"配方": [["小黄鱼", "7条约250g", "-", "主料，去鳞去内脏"], ["小香葱节", "150g", "-", "垫底盖面，浇热油激香"], ["色拉油", "1kg(炸用)+适量(炒用)", "-", "油炸+浇油"], ["煳辣椒", "50g", "-", "干炒捣碎，焦香微糊"], ["盐", "6g", "-", "基咸"], ["胡椒粉", "1g", "-", "辛香去腥"], ["香油", "2g", "-", "尾香提味"], ["料酒", "10g", "-", "去腥"], ["味精", "7g", "-", "提鲜"], ["生粉", "20g", "-", "拍粉，炸后酥脆"], ["丘北干辣椒", "适量", "-", "煳辣椒原料，尖椒红辣"]], "SOP": ["煳辣椒制作：干丘北辣椒入净锅干炒至发出焦香味、表面略糊，趁热入石臼捣碎（不要太细）", "小黄鱼去鳞去内脏洗净，加料酒10g+胡椒粉1g+盐6g+味精7g+香油2g腌制入味", "腌好后拍生粉20g，入六成热油炸至酥脆，捞出切成两段", "锅放底油烧至六成热，下黄鱼段+煳辣椒50g+盐+味精炒匀，置于盘中", "盖上小香葱节150g，浇上七成热油激香即可"], "毛利": "成本约¥6-8/份(7条小黄鱼) → 零售¥18-25 → 毛利60-68%", "设备": "炒锅 / 炸锅 / 石臼(捣煳辣椒) / 漏勺", "替代": "丘北辣椒→二荆条干辣椒(香够辣不够) / 小黄鱼→小黄花鱼(肉质略粗)", "变体": "烤小黄鱼配孜然/香辣小黄鱼/椒盐小黄鱼", "常见问题": "Q:鱼炸出来不酥脆? A:生粉没拍匀或油温不够,六成热下锅炸至金黄酥脆再捞出。Q:煳辣椒不香? A:干炒火候不够,必须炒至表面略糊出焦香再捣碎", "建议图片描述": "A close-up of crispy deep-fried small yellow croakers (Kao Xiao Huang Yu) arranged on a plate, topped with a generous pile of fresh chopped scallion sections and sizzling hot chili oil. The fish is golden-brown and crispy, with visible crushed dry-fried chilies (糊辣椒) scattered on top. Warm steam rising from the freshly poured hot oil, rustic dinner table setting, soft overhead lighting, high-resolution food photography, no text, no recipe.", "美食故事": "云贵街边的小馆子里，煳辣椒的焦香隔着几条街都能闻到。刚出锅的小黄鱼通体金黄酥脆，铺在碧绿的香葱节上，一勺滚油浇下去，\"嗞啦\"一声，葱香和煳辣椒的焦香瞬间炸开。\n\n夹起一条，外皮酥脆到轻轻一碰就掉渣，里面的鱼肉却嫩滑入味。煳辣椒特有的焦香和微辣，配合小葱经热油激发后的清甜，入口层次分明，越嚼越香，下酒一流。", "仪式感": ["煳辣椒必须干炒至表面略糊出焦香再捣碎，太细则失去焦香颗粒感", "最后浇七成热油是小黄鱼的灵魂一步，激发出葱香与煳辣椒的双重香气"], "场景标签": ["佐餐", "下酒", "零食"]}, "CD-034": {"配方": [["鸡翅中", "12个", "-", "主料，做锤型过油"], ["秘制腌料", "50g", "-", "腌制入味"], ["腌姜丝", "10g", "-", "去腥增香"], ["洋葱丝", "20g", "-", "爆香底料"], ["香叶", "3片", "-", "清香增香"], ["色拉油", "50g", "-", "爆香用"], ["可乐汁", "20g", "-", "复合甜香调味"], ["湿淀粉", "20g", "-", "勾芡挂汁"], ["水", "300g", "-", "煲制介质"], ["盐", "10g(腌料)", "-", "基咸"], ["味精", "10g(腌料)", "-", "提鲜"], ["白糖", "50g(腌料)", "-", "回甘调和"], ["蚝油", "5g(腌料)", "-", "增鲜"], ["洋葱丝", "15g(腌料)", "-", "增香"], ["生抽", "50g(腌料)", "-", "咸鲜调色"], ["生粉", "50g(腌料)", "-", "嫩肉锁水"], ["姜丝", "10g(腌料)", "-", "去腥"], ["可乐", "1500g(可乐汁)", "-", "甜香主体"], ["味啉", "100g(可乐汁)", "-", "日式甜料酒"], ["白味噌", "30g(可乐汁)", "-", "日式酱香增厚"], ["日本清酒", "120g(可乐汁)", "-", "去腥增醇"], ["香油", "5g(可乐汁)", "-", "尾香"], ["生抽", "50g(可乐汁)", "-", "调色调咸"], ["美极鲜酱油", "10g(可乐汁)", "-", "增鲜"]], "SOP": ["预制腌料：盐10g+味精10g+白糖50g+蚝油5g+洋葱丝15g+生抽50g+生粉50g+姜丝10g混合", "预制可乐汁：可乐1500g+味啉100g+白味噌30g+日本清酒120g+香油5g+生抽50g+美极鲜酱油10g烧沸调匀", "鸡翅中12个做成锤型，入六成热油过油捞出备用", "砂锅下油烧热，下洋葱丝20g+腌姜丝10g+香叶3片爆香", "下鸡翅中+可乐汁20g+水300g，煲至汤浓", "捞出鸡翅装盘，原汁加湿淀粉20g勾芡淋在鸡翅上即可"], "毛利": "成本约¥10-12/份(12个鸡翅中) → 零售¥28-35 → 毛利60-65%", "设备": "砂锅 / 炸锅 / 炒锅", "替代": "可乐汁→雪碧+生抽(甜度低) / 味啉→米酒+白糖(风味略不同) / 白味噌→黄豆酱(偏咸)", "变体": "可乐鸡翅煲/可乐鸡腿/可乐中翅", "常见问题": "Q:鸡翅不入味? A:腌制时间不够,秘制腌料需腌30分钟以上。Q:汤汁不够浓稠? A:煲制时间不够或勾芡太少,收浓后再勾芡淋汁", "建议图片描述": "A close-up of glazed Coca-Cola chicken wings (Kele Jichi) arranged on a white ceramic plate, coated in a rich, glossy dark-brown sweet soy glaze with sesame seeds garnish. The chicken skin is caramelized to a beautiful golden-brown sheen. Warm restaurant lighting, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "可乐鸡翅大概是全中国家庭厨房里最没有门槛的一道硬菜。但真正做好它，秘密藏在那一锅事先调好的复合可乐汁里——味啉的清甜、白味噌的醇厚、清酒的米香，和可乐的焦糖甜味交织在一起。\n\n过油后的鸡翅表皮微脆，在砂锅中慢煲至汤汁浓稠收紧，甜咸交织的酱汁牢牢挂在每一只鸡翅上。夹起一只，轻轻一扯，骨肉分离，酱汁顺着手指流下。", "仪式感": ["鸡翅做成锤型过油定型，既美观又便于入味", "可乐汁需提前调好烧沸，使味啉与味噌完全融合后再入菜"], "场景标签": ["佐餐", "零食"]}, "CD-035": {"配方": [["纯牛奶", "5000g(批次)", "-", "奶基主体"], ["白糖", "400g(批次)", "-", "甜味调节"], ["商用菌粉", "0.5g(批次)", "-", "发酵菌种，拉丝关键"], ["果酱", "500g(批次)", "-", "调口味（可选，原味可不加）"]], "SOP": ["纯牛奶5000g+白糖400g+商用菌粉0.5g+果酱500g全部混合均匀", "倒入酸奶机，设置43℃发酵8小时", "发酵完成后冷藏12小时钝化定型", "出餐时按需分装，原味不加果酱亦可"], "毛利": "成本约¥0.80-1.20/杯(200ml) → 零售¥5-8 → 毛利75-85%", "设备": "商用酸奶机43℃恒温 / 冷藏柜 / 分装杯", "替代": "纯牛奶→全脂奶粉+水(需调整比例) / 商用菌粉→普通酸奶菌(拉丝效果差)", "变体": "原味拉丝酸奶/芒果拉丝酸奶/草莓拉丝酸奶/蓝莓拉丝酸奶", "常见问题": "Q:拉丝效果不明显? A:菌粉活性不足或发酵温度不够,确保43℃恒温发酵8小时。Q:酸奶太酸? A:发酵时间可适当缩短至7小时,或增加白糖比例", "建议图片描述": "A close-up shot of thick, stretchy Greek-style yogurt being lifted with a spoon, showing long elastic strands (拉丝) as it drips slowly back into a glass bowl. The yogurt is creamy white and smooth, with visible fruit jam swirls on the side. Bright clean kitchen counter setting, soft natural lighting from a window, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "街头酸奶摊前，老板用长勺舀起一勺浓稠的白色酸奶，拉出一条长长的丝线，缓缓坠落——这一下视觉冲击就值回了票价。\n\n入口绵密丝滑，带着浓郁的奶香和恰到好处的酸甜。商用菌粉经过43℃8小时的精确发酵，赋予了酸奶独特的黏稠拉丝质地，冷藏12小时钝化后，口感更加醇厚细腻。", "仪式感": ["舀起一勺酸奶需拉出长丝再缓缓落下，拉丝视觉效果是这款产品的核心卖点", "冷藏12小时钝化不可跳过，时间不够拉丝效果和口感都会打折扣"], "场景标签": ["零食", "休闲", "早餐"]}, "CD-036": {"配方": [["小甲鱼", "适量", "-", "主料，卤制"], ["高汤", "15斤(批次)", "-", "卤水基底"], ["大豆油", "200g(批次)", "-", "炒料底油"], ["糍粑辣椒", "500g(批次)", "-", "辣度核心红油基底"], ["青红花椒", "各30g(批次)", "-", "麻香底"], ["辣椒王", "200g(批次)", "-", "增辣"], ["生姜", "200g(批次)", "-", "去腥增香"], ["大蒜", "200g(批次)", "-", "蒜香底"], ["洋葱", "200g(批次)", "-", "增甜底香"], ["白糖", "100g(批次)", "-", "回甘调和"], ["盐", "180g(批次)", "-", "基咸"], ["料酒", "250g(批次)", "-", "去腥"], ["蚝油", "50g(批次)", "-", "增鲜"], ["香料包", "200g(批次)", "-", "复合香料包"], ["鸡精", "100g(批次)", "-", "提鲜"], ["味精", "100g(批次)", "-", "提鲜"], ["乙基麦芽粉", "10g(批次)", "-", "增香增厚"], ["味极鲜酱油", "100g(批次)", "-", "鲜咸调色"], ["八角", "35g(香料包)", "-", "君料"], ["白芷", "30g(香料包)", "-", "去膻增香"], ["陈皮", "15g(香料包)", "-", "果香解腻"], ["毕拔", "15g(香料包)", "-", "去腥"], ["干姜", "20g(香料包)", "-", "姜香"], ["砂仁", "12g(香料包)", "-", "增香去腥"], ["草果", "15g(香料包)", "-", "去腥增香"], ["桂皮", "20g(香料包)", "-", "复合香"], ["丁香", "3g(香料包)", "-", "尖香点缀"], ["当归", "15g(香料包)", "-", "药香底味"], ["白扣", "10g(香料包)", "-", "去腥"], ["良姜", "20g(香料包)", "-", "去腥增香"], ["胡椒", "20g(香料包)", "-", "辛香"], ["灵草", "3g(香料包)", " ting, shallow depth of field, high-resolution beverage photography, no text, no recipe.", "美食故事": "炭烧拉丝酸奶是普通酸奶的升级版——红糖的焦香和炭烧粉独特的烟熏风味，让原本清爽的酸奶多了几分层次感。\n\n舀起一勺，深灰色的酸奶拉出绵长的丝线，入口是炭烧特有的温和烟熏味，紧接着红糖的甘甜慢慢化开，尾韵是奶香和发酵酸味的完美平衡。", "仪式感": ["舀起时拉丝越长视觉效果越好，炭烧酸奶的灰白色拉丝在视觉上比普通白酸奶更有冲击力", "冷藏12小时钝化不可跳过，确保拉丝效果和口感"], "场景标签": ["零食", "休闲"]}, "CD-038": {"配方": [["土鸡腿", "400g", "-", "主料，剁2cm块"], ["干辣椒", "150g", "-", "辣度核心，量足才够味"], ["干花椒", "100g", "-", "麻香底"], ["老干妈豆豉", "20g", "-", "豆豉酱香"], ["姜片", "4g", "-", "去腥增香"], ["蒜子", "10g", "-", "蒜香底"], ["色拉油", "1kg(耗约60g)", "-", "油炸介质"], ["老抽", "7g", "-", "调色"], ["花椒油", "5g", "-", "增麻尾香"], ["芝麻油", "5g", "-", "尾香"], ["熟芝麻", "5g", "-", "点缀增香"], ["酥花生米", "25g", "-", "酥脆口感"], ["料酒", "7g(腌渍料)", "-", "去腥"], ["盐", "7g(腌渍料)", "-", "基咸"], ["味精", "7g(腌渍料)", "-", "提鲜"], ["自制香料粉", "5g(腌渍料)", "-", "复合香底"]], "SOP": ["土鸡腿肉剁2cm见方块，漂去血水", "加料酒7g+盐7g+味精7g+自制香料粉5g腌渍10分钟", "锅入油烧至六成热，下鸡块炸至棕红色捞出控油", "油温升至七成热，鸡块迅速复炸一次至酥脆", "锅留底油大火烧热，下姜片4g+蒜子10g爆香", "放干辣椒150g+花椒100g小火煸炒出麻辣香味", "下炸好的鸡块+老抽7g+老干妈豆豉20g+花椒油5g+芝麻油5g翻炒", "加熟芝麻5g+酥花生米25g继续翻炒即可出锅"], "毛利": "成本约¥15-18/份(土鸡腿400g+大量辣椒花椒) → 零售¥38-58 → 毛利55-60%", "设备": "炒锅 / 炸锅 / 漏勺", "替代": "土鸡腿→三黄鸡腿(肉质偏软) / 干辣椒→二荆条(香够不够辣)", "变体": "辣子鸡丁/辣子鸡翅/辣子鸡杂", "常见问题": "Q:鸡肉不酥脆? A:复炸步骤不可省,六成热炸熟→七成热复炸至酥脆。Q:辣椒发苦? A:小火煸炒干辣椒,火大了会焦苦", "建议图片描述": "A close-up of a classic Sichuan spicy chicken (Lazi Ji) dish, piled high with crispy dark-brown chicken chunks buried in a mountain of dried red chilies and Sichuan peppercorns. Sprinkled with white sesame seeds and roasted peanuts. Warm rustic dining table setting, dramatic side lighting, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "川菜馆里最考验功力的一道菜——不是因为它有多难，而是因为辣椒和鸡肉的比例、油炸的火候、煸炒的时机，差了任何一步都不是那个味。\n\n正宗的辣子鸡，辣椒要比鸡多。在满盘干辣椒和花椒里翻找鸡块，本身就是吃辣子鸡的乐趣。鸡块经过两次油炸，外酥里嫩，麻辣味透过表面紧紧锁在肉里。", "仪式感": ["六成热炸熟→七成热复炸酥脆，两段式炸法是辣子鸡外酥里嫩的关键", "干辣椒和花椒必须小火慢煸出香，大火会焦糊发苦"], "场景标签": ["佐餐", "下酒", "聚餐"]}, "CD-039": {"配方": [["草鱼", "1条(约3斤)", "-", "主料，骨肉分离"], ["鱼酸菜", "150g", "-", "酸味基底"], ["酸萝卜", "30g", "-", "增酸层次"], ["野山椒", "50g", "-", "酸辣核心"], ["黄灯笼酱", "30g", "-", "金黄汤色酸辣"], ["泡姜", "30g", "-", "姜香酸辣"], ["高汤", "1500g", "-", "汤底介质"], ["干红花椒", "1g", "-", "麻香点缀"], ["盐", "3g(调味)+1g(码味)", "-", "基咸"], ["鸡精", "15g(调味)+2g(码味)", "-", "提鲜"], ["味精", "8g", "-", "提鲜"], ["鸡蛋清", "1个", "-", "上浆嫩肉"], ["料酒", "适量", "-", "去腥"], ["白醋", "适量", "-", "调酸"], ["生粉", "适量", "-", "上浆锁水"], ["胡椒粉", "少许", "-", "辛香去腥"], ["白糖", "少许", "-", "回甘调和"], ["色拉油", "适量", "-", "炒料底油"], ["猪油", "适量", "-", "增香醇厚"], ["姜蒜", "各30g", "-", "爆香底料"], ["葱花", "适量", "-", "点缀"], ["子弹头红泡椒", "适量", "-", "浇油点缀"], ["花椒", "适量", "-", "浇油激香"]], "SOP": ["草鱼洗净去骨，鱼肉打成片，鱼骨留用", "鱼片加盐1g+鸡精2g+少许胡椒粉+料酒+生粉+蛋清1个码味上浆", "锅中少油将鱼骨煎至两面金黄倒出备用", "锅放色拉油+猪油烧热，下姜蒜+鱼酸菜150g+酸萝卜30g+泡姜30g+野山椒50g+黄灯笼酱30g炒香炒出辣味", "加水+高汤1500g+煎好的鱼骨，大火熬制3分钟", "捞出鱼骨和酸菜垫底，汤中调盐+鸡精+味精+白糖+白醋+料酒+胡椒粉", "小火下鱼片煮25秒捞出盖在酸菜上", "撒葱花+子弹头红泡椒+花椒，浇热油激香即可"], "毛利": "成本约¥25-30/份(草鱼3斤+酸菜+调料) → 零售¥68-88 → 毛利58-65%", "设备": "炒锅 / 汤锅 / 鱼片刀", "替代": "草鱼→黑鱼(肉质更紧,成本高) / 黄灯笼酱→黄剁椒(色泽偏暗)", "变体": "金汤酸菜鱼/藤椒酸菜鱼/番茄酸菜鱼", "常见问题": "Q:鱼片易碎? A:上浆不够或煮太久,鱼片下锅25秒即捞出,余温会继续熟化。Q:汤色不够金黄? A:黄灯笼酱用量不够或炒制时间不足", "建议图片描述": "A close-up of a large white ceramic bowl filled with classic Chinese sour cabbage fish (Suan Cai Yu), with tender white fish fillets swimming in a rich golden-yellow spicy broth. Pickled cabbage, red pickled peppers, and green onions are visible on top, with hot oil glaze shimmering on the surface. Warm steam rising, cozy restaurant table setting, soft overhead lighting, high-resolution food photography, no text, no recipe.", "美食故事": "酸菜鱼大概是川菜里最不需要解释的一道菜——金黄浓郁的汤底、嫩滑入味的鱼片、酸爽开胃的老坛酸菜，这三样东西组合在一起就是征服全国人民的味觉密码。\n\n草鱼骨先煎后熬出奶白浓汤，老坛酸菜和野山椒在猪油里炒出酸辣香气，黄灯笼酱赋予汤底诱人的金黄色泽。鱼片下锅只需25秒，嫩滑到几乎夹不起来。", "仪式感": ["鱼骨先煎至金黄再熬汤，煎过的鱼骨出汤更浓白", "鱼片下锅严格控制在25秒，余温熟化至刚好嫩滑"], "场景标签": ["佐餐", "聚餐", "下酒"]}, "CD-040": {"配方": [["青椒", "150g", "-", "主料，炸至表皮松起"], ["红椒", "150g", "-", "主料，配色增甜"], ["葱", "10g", "-", "增香点缀"], ["盐", "5g", "-", "基咸"], ["酱油", "3g", "-", "咸鲜调色"], ["老抽", "5g", "-", "上色"], ["秘制辣椒油", "30g", "-", "辣味核心，复合香辣"]], "SOP": ["青红椒分别切去两端蒂头，洗净备用", "锅盛油烧热，下青红椒炸至表皮松起呈虎皮状时捞出", "盛入盘内，加盐5g+酱油3g+老抽5g+秘制辣椒油30g", "加入葱10g，拌匀即可"], "毛利": "成本约¥2-3/份 → 零售¥8-12 → 毛利70-75%", "设备": "炸锅 / 拌菜盆", "替代": "秘制辣椒油→红油+花椒油(风味略简单) / 青红椒→杭椒(更辣)", "变体": "凉拌虎皮椒皮蛋/虎皮椒拌木耳/虎皮椒拌牛肉", "常见问题": "Q:虎皮出不来? A:油温不够高或炸的时间不够,高温快炸至表皮起泡即捞出。Q:太油腻? A:炸后可用厨房纸吸油再拌", "建议图片描述": "A close-up of Chinese tiger-skin peppers (Hu Pi Jiao) blistered and charred, tossed in a rich red chili oil dressing with soy sauce and chopped green onions, served in a simple white bowl. The peppers show beautiful blackened blistered skin patterns. Warm rustic dinner table setting, soft overhead lighting, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "一份好的凉拌虎皮椒，关键在于辣椒炸得恰到好处——表皮起泡呈虎皮斑纹，但里面还保持着辣椒的脆嫩。\n\n浇上秘制辣椒油，咸鲜微辣，虎皮椒的焦香和辣椒油的复合香气交织在一起，简单却让人停不下筷子。", "仪式感": ["青红椒必须高温快炸至表皮起泡即捞出，保持内部脆嫩口感", "炸好的辣椒趁热拌入调料，热椒更容易吸收酱汁"], "场景标签": ["佐餐", "零食", "下酒"]}, "CD-041": {"配方": [["保宁陈醋", "500g(醋水)", "-", "醋基，酸味醇厚"], ["水", "50g(醋水)", "-", "稀释介质"], ["八角", "2g(醋水)+4g(香料水)", "-", "君料增香"], ["桂皮", "1g(醋水)+2g(香料水)", "-", "复合香"], ["香叶", "1g(醋水)+2g(香料水)", "-", "清香"], ["花椒", "1g(醋水)+10g(香料水)", "-", "麻香底"], ["草果", "3g(醋水)", "-", "去腥增香"], ["水", "800g(香料水)", "-", "香料萃取介质"], ["葱段", "30g(香料水)", "-", "葱香底"], ["姜片", "20g(香料水)", "-", "姜香去腥"], ["小茴香", "2g(香料水)", "-", "回香引子"], ["丁香", "2g(香料水)", "-", "尖香点缀"]], "SOP": ["【醋水】锅中放冷水50g+保宁陈醋500g，加八角2g+桂皮1g+香叶1g+花椒1g+草果3g", "烧开后关火，冷却后静置1小时", "捞出香料，醋水即制作完成备用", "【香料水】水800g烧开，放入葱段30g+姜片20g+花椒10g+八角4g+香叶2g+桂皮2g+小茴香2g+丁香2g", "开锅后关火小火熬5分钟左右至香味出来", "捞出原料，水凉至常温即制作完成"], "毛利": "成本极低(香料折旧) → 作为凉皮配套调味水使用", "设备": "不锈钢锅 / 滤网", "替代": "保宁陈醋→山西老陈醋(风味稍烈) / 香料水香料可按比例批量预制", "变体": "凉皮复合调味水/凉皮蒜水/凉皮芝麻酱", "常见问题": "Q:醋水味道太冲? A:加50g水稀释,静置1小时让香料融合。Q:香料水香味不够? A:小火熬足5分钟,关火后不急着捞,用余温继续萃取", "建议图片描述": "A close-up of two glass jars containing Chinese cold noodle (Liangpi) condiment bases - one dark brown aged vinegar infusion with floating star anise and cinnamon, and one clear golden spice-infused water with ginger and scallion slices visible. Clean kitchen counter setting, soft natural window light, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "凉皮好不好吃，七分在调味水。一份正宗的凉皮，醋水和香料水是灵魂所在。\n\n保宁陈醋配八角桂皮慢煮静置，酸味变得柔和醇厚；香料水用8味香料小火熬出复合香气，二者合一浇在凉皮上，酸中带香、香中回甘。", "仪式感": ["醋水煮好后必须静置1小时再滤出香料，让香料风味与醋完全融合", "香料水小火熬5分钟出香即可，久煮香料会发苦"], "场景标签": ["佐餐", "酱料"]}, "CD-042": {"配方": [["蒜瓣", "100g(蒜水)", "-", "蒜香核心"], ["凉白开水", "150g(蒜水)", "-", "蒜香萃取介质"], ["水", "500g(调料水)", "-", "调料溶解基底"], ["盐", "50g(调料水)", "-", "基咸"], ["白糖", "15g(调料水)", "-", "回甘调和"], ["味精", "25g(调料水)", "-", "提鲜"], ["鸡精", "25g(调料水)", "-", "提鲜"], ["生抽", "50g(调料水)", "-", "咸鲜调色"]], "SOP": ["【蒜水】蒜瓣100g拍碎切成最细的末", "倒入凉白开水150g搅拌，放置1小时即可", "【调料水】水500g+盐50g+糖15g+味精25g+鸡精25g+生抽50g", "所有调料放入水中搅拌均匀至充分溶解即可"], "毛利": "成本极低 → 作为凉皮配套调味水使用", "设备": "不锈钢盆 / 切蒜器 / 搅拌勺", "替代": "蒜水→鲜蒜汁(风味不同) / 生抽→味极鲜(鲜度更高)", "变体": "凉皮芝麻酱水/凉皮香辣油/凉皮复合调味汁", "常见问题": "Q:蒜水不够香? A:蒜必须切成最细的末,放置1小时以上让蒜香充分释出。Q:调料水咸淡不匀? A:必须充分搅拌至盐和糖完全溶解", "建议图片描述": "A close-up of two small bowls containing Chinese cold noodle (Liangpi) condiments - one milky white garlic water with visible minced garlic particles, and one light brown seasoned soy sauce water. Clean kitchen counter setting, soft natural light, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "凉皮的调味水是一整套体系——醋水提供酸、香料水提供香、蒜水提供辛、调料水提供咸鲜基底。四味合一浇在凉皮上，配上红油辣子和黄瓜丝，就是夏天最解馋的那一碗。", "仪式感": ["蒜必须切至极细的末，静置1小时以上让蒜素充分释放到水中", "调料水需搅拌至盐糖完全溶解，出餐前再搅匀一次防止沉淀"], "场景标签": ["佐餐", "酱料"]}, "CD-043": {"配方": [["五花肉", "500g", "-", "主料，腌制蒸制"], ["糯米", "500g", "-", "炒香打粉，裹肉增黏"], ["糯米粉", "200g", "-", "裹粉锁水增糯"], ["豆瓣酱", "50g(加葱姜末爆香)", "-", "酱香红油基底"], ["甜面酱", "30g", "-", "甜酱调和"], ["蚝油", "20g", "-", "增鲜"], ["黄豆酱", "20g", "-", "复合酱香"], ["柱侯酱", "20g", "-", "酱香醇厚"], ["户户辣椒粉", "10g", "-", "辣味核心"], ["味精", "10g", "-", "提鲜"], ["鸡精", "10g", "-", "提鲜"], ["凉水", "100g", "-", "调稀腌制介质"], ["草果去籽", "5g(炒香)", "-", "增香"], ["香叶", "1g(炒香)", "-", "清香"], ["桂皮", "5g(炒香)", "-", "复合香"], ["小茴香", "5g(炒香)", "-", "回香引子"], ["八角", "5g(炒香)", "-", "君料"], ["高筋面粉", "500g(面饼)", "-", "面皮主料"], ["酵母粉", "5g(面饼)", "-", "发酵膨松"], ["无铝泡打粉", "5g(面饼)", "-", "辅助膨松"], ["绵白糖", "5g(面饼)", "-", "促进发酵"], ["水", "260g(面饼)", "-", "和面介质"]], "SOP": ["糯米500g+草果5g+香叶1g+桂皮5g+小茴香5g+八角5g入锅小火炒香", "炒好的糯米打碎成糯米粉备用", "豆瓣酱50g加葱姜末爆香炒出红油备用", "五花肉500g切片，加甜面酱30g+蚝油20g+黄豆酱20g+柱侯酱20g+户户辣椒粉10g+味精鸡精各10g+凉水100g+糯米粉200g+炒香糯米+炒香豆瓣酱", "抓拌均匀腌制入味", "肉腌制好后放入蒸笼，蒸2-3小时", "【面饼】高筋面粉500g+酵母5g+泡打粉5g+绵白糖5g+水260g和成面团", "发酵后分成小剂，擀成圆饼，烙或蒸熟", "蒸好的笼笼肉夹入面饼中即可"], "毛利": "成本约¥8-10/份(含五花肉+面饼+调料) → 零售¥18-25 → 毛利55-60%", "设备": "蒸笼 / 炒锅 / 和面盆 / 擀面杖", "替代": "柱侯酱→海鲜酱(风味偏甜) / 户户辣椒粉→普通辣椒粉(辣度略低)", "变体": "笼笼肉夹荷叶饼/笼笼肉夹烧饼/粉蒸肉夹馍", "常见问题": "Q:肉不够软烂? A:蒸制时间不够,需足2-3小时至五花肉酥烂。Q:面饼不蓬松? A:发酵时间不够或酵母失效,需温水和面充分发酵", "建议图片描述": "A close-up of a Chinese steamed pork belly bun (Longlong Rou Jia Mo), with a soft fluffy white bun holding a generous portion of tender, sticky steamed pork belly coated in a rich red fermented rice and bean sauce. Visible steam rising, rustic wooden table background, warm ambient lighting, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "笼笼肉夹馍是陕西小吃里存在感被严重低估的一位——糯米和香料炒香后裹在五花肉上，经过2小时蒸制，糯米吸收了肉汁和酱料的精华，变得软糯黏稠。\n\n夹在热乎乎的白面饼里，一口咬下去，糯米的黏、肉的酥烂、酱料的复合香味和白面的麦香同时在嘴里化开。", "仪式感": ["糯米必须与香料一起小火炒香再打粉，这一步决定了糯米的底味", "五花肉需蒸足2-3小时至酥烂，蒸笼出笼时糯米与肉应呈黏稠一体状"], "场景标签": ["佐餐", "早餐", "零食"]}, "CD-044": {"配方": [["猪前蹄", "1只", "-", "主料，烧皮去黑斩段"], ["红曲米", "5g", "-", "天然上色，红润亮泽"], ["冰糖", "70g", "-", "炒糖色，回甘油亮"], ["精醋汁", "10g", "-", "解腻提酸"], ["生抽", "80g", "-", "咸鲜调色"], ["蒜米", "25g", "-", "蒜香底"], ["干葱", "25g", "-", "葱香底"], ["生姜", "15g", "-", "去腥增香"], ["香菜", "15g", "-", "异香提味"], ["浓缩鸡汁", "10g", "-", "增鲜"], ["八角", "6粒", "-", "君料增香"], ["香叶", "6片", "-", "清香"], ["甘草", "6g", "-", "回甘调和"], ["山楂片", "20g", "-", "解腻催化酥软"], ["小茴香", "5g", "-", "回香引子"], ["桂皮", "5g", "-", "复合香"], ["盐", "20g", "-", "基咸"], ["味精", "15g", "-", "提鲜"], ["鸡粉", "10g", "-", "提鲜"], ["蚝油", "10g", "-", "增鲜"], ["水", "3斤", "-", "卤煮介质"], ["小菜(酸菜/青菜)", "适量", "-", "配餐解腻"]], "SOP": ["猪手用喷火枪烧黑表面猪皮至变硬，放入冷水中浸泡再擦洗干净，洗去黑色表面", "猪手斩成两段备用", "所有材料（红曲米5g+冰糖70g+精醋汁10g+生抽80g+蒜米25g+干葱25g+ (香料包)", "-", "回香引子"]], "SOP": ["香料包：荜拨1.5g+甘草1g+山奈3g+八角3g+桂皮1.5g+草果3g+草豆蔻1g+香砂仁1g+干辣椒2g+红花椒1.5g+白豆蔻5g+排草0.5g+公丁香0.5g+千里香1.5g+小茴香1.5g混合装袋", "锅入色拉油150g烧热，下葱姜蒜各30g+小米椒段10g+二荆条辣椒10g+红花椒10g+朝天椒10g爆香", "加水5斤+香料包+料酒15g+食盐40g+白糖25g+味极鲜25g+老抽适量+鸡肉鲜香膏20g", "大火烧开转小火熬出香味", "下虾卤制至入味，关火前加鸡精30g+味精15g调匀", "卤好浸泡入味即可"], "毛利": "成本按虾时价+卤水折旧核算", "设备": "卤水桶 / 炒锅 / 香料袋", "替代": "鸡肉鲜香膏→鸡精+鸡粉(鲜度略降) / 千里香→灵草(风味接近)", "变体": "卤虾尾/卤龙虾/卤虾滑", "常见问题": "Q:虾不入味? A:卤制时间不够或卤水香料不足,需小火卤足时间后浸泡入味。Q:卤水发苦? A:公丁香用量已极低0.5g,不可多加", "建议图片描述": "A close-up of a large metal basin filled with bright red braised crawfish (卤虾) coated in a rich, glossy spicy sauce, garnished with fresh cilantro and sliced scallions. Visible whole spices and chili peppers floating in the broth. Warm, moody night market stall lighting with steam rising, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "卤虾和麻辣小龙虾最大的区别在于——卤虾吃的是香料的复合层次，而不是单纯的重麻重辣。\n\n15味中草药香料包配二荆条和朝天椒，在5斤水中慢火熬出金黄透亮的卤汁，虾的鲜甜和香料的醇厚在卤制中完美融合。", "仪式感": ["香料包15味香料需精准配比，白豆蔻5g的量最大以确保清凉辛香打底", "虾卤好后让它在卤汤中浸泡入味再捞出，味道更透"], "场景标签": ["夜宵", "下酒", "休闲"]}, "CD-046": {"配方": [["鲜猪大肠", "约3000g", "-", "主料，清洗去污"], ["干辣椒", "20g(批次)", "-", "辣度"], ["陈皮", "15g(批次)", "-", "果香解腻"], ["桂皮", "10g(批次)", "-", "复合香"], ["八角", "10g(批次)", "-", "君料增香"], ["花椒", "10g(批次)", "-", "麻香"], ["白芷", "10g(批次)", "-", "去膻增香"], ["小茴香", "5g(批次)", "-", "回香引子"], ["香茅草", "5g(批次)", "-", "异香"], ["白蔻", "5g(批次)", "-", "去腥"], ["香叶", "5g(批次)", "-", "清香"], ["山奈", "3g(批次)", "-", "增香"], ["葱段", "80g(批次)", "-", "去腥增香"], ["姜片", "50g(批次)", "-", "去腥"], ["精盐", "50g(批次)", "-", "基咸"], ["胡椒粉", "10g(批次)", "-", "辛香去腥"], ["面粉或淀粉", "适量", "-", "揉搓去污"], ["白醋", "适量", "-", "揉搓去腥"]], "SOP": ["新鲜肥肠翻面，加面粉或淀粉揉搓吸附污物，冲洗干净", "加适量精盐和白醋揉搓一遍，翻过来再次加盐和白醋揉搓", "清水彻底冲洗干净备用", "锅中加清水，下干辣椒20g+陈皮15g+桂皮10g+八角10g+花椒10g+白芷10g+小茴香5g+香茅草5g+白蔻5g+香叶5g+山奈3g+葱段80g+姜片50g+精盐50g+胡椒粉10g", "大火烧开，放入清理好的肥肠煮3分钟", "转小火煮60分钟至肥肠软烂入味", "关火浸泡40分钟，捞出即可"], "毛利": "成本约¥15-20/份(鲜猪大肠3kg出成约1.5kg) → 零售¥35-48 → 毛利55-60%", "设备": "卤水桶 / 炒锅 / 清洗盆", "替代": "鲜大肠→冷冻大肠(口感偏软) / 面粉→淀粉(吸附力更强)", "变体": "卤肥肠面/干煸肥肠/肥肠煲", "常见问题": "Q:肥肠有腥味? A:面粉+盐+白醋三步揉搓清洗不可省略,必须翻面内外都洗。Q:肥肠嚼不动? A:卤制时间不够,小火60分钟+浸泡40分钟才够软烂", "建议图片描述": "A close-up of tender braised pork intestines (卤肥肠) arranged on a plate, dark reddish-brown color from the spice broth, glistening with a light coating of seasoned oil, garnished with chopped scallions and cilantro. Warm rustic restaurant setting, soft overhead lighting, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "卤味摊上，卤肥肠是检验一家店功力的试金石。处理不好的肥肠吃起来腥臊难忍，处理好了则是口感最完美的卤味——外层软糯、内层略带嚼劲。\n\n12味香料在小火慢煮60分钟中把风味完全逼入肥肠，再浸泡40分钟让香味收尾。夹起一块蘸一点干辣椒面，肠衣的弹糯和香料的醇厚在口中层层绽放。", "仪式感": ["面粉+盐+白醋三步清洗法去腥彻底，是卤肥肠好吃的第一道门槛", "小火60分钟煮透+关火40分钟浸泡入味，两段式卤制让肥肠软糯不烂"], "场景标签": ["佐餐", "下酒", "夜宵"]}, "CD-047": {"配方": [["驴肉", "15kg(批次)", "-", "主料，切大块焯水"], ["清水", "20kg(批次)", "-", "卤煮介质"], ["糖色", "100g(批次)", "-", "天然上色红润"], ["八角", "20g(香料包)", "-", "君料"], ["花椒", "25g(香料包)", "-", "麻香"], ["桂皮", "30g(香料包)", "-", "复合香"], ["丁香", "5g(香料包)", "-", "尖香点缀"], ["香叶", "20g(香料包)", "-", "清香"], ["小茴香", "50g(香料包)", "-", "回香引子"], ["甘草", "10g(香料包)", "-", "回甘调和"], ["白芷", "10g(香料包)", "-", "去膻增香"], ["白豆蔻", "15g(香料包)", "-", "去腥清凉"], ["草扣", "10g(香料包)", "-", "去腥"], ["沙姜", "20g(香料包)", "-", "增香去腥"], ["陈皮", "15g(香料包)", "-", "果香解腻"], ["草果去籽", "4个(香料包)", "-", "去腥增香"], ["罗汉果", "2个(香料包)", "-", "回甘清香"], ["红栀子", "10g(香料包)", "-", "天然金黄色"], ["味精", "100g(批次)", "-", "提鲜"], ["鸡精", "100g(批次)", "-", "提鲜"], ["料酒", "250g(批次)", "-", "去腥"], ["大葱", "100g(批次)", "-", "去腥增香"], ["大姜", "100g(批次)", "-", "去腥"], ["白酒", "100g(批次)", "-", "强力去腥"], ["面粉", "500g(火烧)", "-", "面饼主料"], ["盐", "3g(火烧)", "-", "面饼基咸"], ["水", "300g(火烧)", "-", "和面介质"], ["面粉", "200g(油酥)", "-", "起酥层次"], ["色拉油", "100g(油酥)", "-", "油酥介质"]], "SOP": ["驴肉15kg切大块，清水浸泡30分钟去血水", "汤桶垫篦子，加清水20kg+糖色100g+全部香料包（八角20g+花椒25g+桂皮30g+丁香5g+香叶20g+小茴香50g+甘草10g+白芷10g+白豆蔻15g+草扣10g+沙姜20g+陈皮15g+去籽草果4个+罗汉果2个+红栀子10g）", "下焯水后的驴肉，调味加味精100g+鸡精100g+料酒250g+大葱100g+大姜100g+白酒100g", "驴肉上面放盘子压住，大火烧开转小火煮2小时", "视驴肉色泽红润、鲜嫩酥烂时关火", "【火烧】面粉500g+盐3g+水300g和成面团", "油酥：面粉20 etting, soft overhead lighting, shallow depth of field, high-resolution food photography, no text, no recipe.", "美食故事": "火锅桌上，麻酱蘸料是北方人的灵魂选择。好的麻酱蘸料——芝麻酱醇厚、花生酱增香、口急汁和美极鲜提味、红豆腐乳提供独特的发酵深度。\n\n韭菜花必须搅碎才能完全融入酱体，每一口都能尝到韭菜的清香却不突兀。矿泉水边加边搅，让麻酱从浓稠慢慢调稀到挂勺的完美状态。", "仪式感": ["水必须边加边搅不可一次性倒入，芝麻酱吸水需逐步调稀才能顺滑", "韭菜花必须搅碎成蓉，整粒的韭菜花在蘸料里口感突兀"], "场景标签": ["佐餐", "酱料"]}, "CD-049": {"配方": [["菜籽油", "5斤(批次)", "-", "混合油基底香"], ["猪油", "7斤(批次)", "-", "动物脂香醇厚"], ["色拉油", "40斤(批次)", "-", "大量稀释基底"], ["牛油", "12斤(批次)", "-", "火锅底味厚重"], ["油辣椒", "7斤(批次)", "-", "辣度主体"], ["辣妹子", "3瓶(批次)", "-", "鲜辣红亮"], ["老干妈", "3瓶(批次)", "-", "豆豉酱香"], ["泡椒酱", "1桶(批次)", "-", "发酵酸辣"], ["红油豆瓣酱", "3斤(批次)", "-", "酱香红油基底"], ["麻椒", "400g(批次)", "-", "麻香底"], ["香叶", "75g(香料组)", "-", "清香"], ["去籽苹果", "75g(香料组)", "-", "增香"], ["草椒", "65g(香料组)", "-", "去腥"], ["小茴香", "75g(香料组)", "-", "回香引子"], ["豆扣", "65g(香料组)", "-", "去腥"], ["良姜", "75g(香料组)", "-", "去腥"], ["八角", "80g(香料组)", "-", "君料"], ["桂皮", "75g(香料组)", "-", "复合香"], ["山奈", "75g(香料组)", "-", "增香"], ["罗汉果", "3个(香料组)", "-", "回甘清香"], ["甘草", "50g(香料组)", "-", "回甘调和"], ["陈皮", "50g(香料组)", "-", "果香解腻"], ["排草", "75g(香料组)", "-", "增香"], ["香茅草", "75g(香料组)", "-", "异香"], ["灵草", "75g(香料组)", "-", "草香尾韵"], ["香松", "100g(香料组)", "-", "增香"]], "SOP": ["混合油：菜籽油5斤+猪油7斤+色拉油40斤+牛油12斤混合备用", "香料包：香叶75g+去籽苹果75g+草椒65g+小茴香75g+豆扣65g+良姜75g+八角80g+桂皮75g+山奈75g+罗汉果3个+甘草50g+陈皮50g+排草75g+香茅草75g+灵草75g+香松100g混合装袋", "香料粉：八角10g+去籽苹果10g+桂皮10g+山奈10g+白扣10g+砂仁10g+小茴香10g+孜然粒10g+丁香3g+白胡椒粉3g+千里香3g+香茅草3g+陈皮3g+排草3g+甘草3g+黄芹5g+木香5g+良姜5g+灵草5g+香叶5g，入锅炒香备用", "混合油入锅烧热，下油辣椒7斤+辣妹子3瓶+老干妈3瓶+泡椒酱1桶+红油豆瓣酱3斤+麻椒400g", "小火炒出红油，下香料包+炒香香料粉，继续小火熬出复合香气", "关火静置，作为麻辣香锅底料使用"], "毛利": "成本按单次出餐用量折算（底料可批量预制，单份成本极低）", "设备": "大容量熬油桶 / 炒锅", "替代": "混合油可按比例批量预制 / 香料粉每次炒香现用", "变体": "麻辣香锅配菜自选（荤素各类）", "常见问题": "Q:底料不香? A:香料需小火慢炒出香,不可大火炒焦。Q:油色不红亮? A:油辣椒和红油豆瓣酱用量够了自然红亮", "建议图片描述": "A close-up of a wok filled with sizzling Sichuan mala fragrant pot (麻辣香锅) loaded with various meats and vegetables, bright red dried chilies and Sichuan peppercorns visible, steam rising, warm moody restaurant li // Render grid
function render(q) {

    h += '<div class="card" onclick="o(\''+c.i+'\')"><div class="img">'+(c.p?'<img src="'+c.p+'">':'🍽️')+'</div><div class="body"><div class="name">'+c.n+'</div><div class="meta"><span class="tag">'+c.c+'</span><span>'+c.m+'</span></div></div></div>'
  })
  g.innerHTML = h||'<div style="padding:40px;text-align:center;color:#999">没有找到匹配的产品</div>'
}

  var m = '<span>'+c.c+'</span><span>毛利用'+c.m+'</span>'+(c.s?'<span>'+c.s+'</span>':'')
  document.getElementById('dm').innerHTML = m
  var h = ''
  if(cd.配方) {
    h += '<div class="d-sec"><div class="d-h">配方（克/g）</div><table>'
    cd.配方.forEach(function(r){ h += '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[3]+'</td></tr>' })
    h += '</table></div>'
  }
  if(cd.SOP) {
    h += '<div class="d-sec"><div class="d-h">SOP</div><div class="d-p">'
    cd.SOP.forEach(function(s){ h += (s.indexOf('：')>0||s.indexOf(':')>0?'▸ ':'')+s+'\n' })
    h += '</div></div>'
  }
  if(cd.毛利) h += '<div class="d-sec"><div class="d-h">毛利模型</div><div class="d-p">'+cd.毛利+'</div></div>'
  if(cd.设备) h += '<div class="d-sec"><div class="d-h">投入产出</div><div class="d-p">'+cd.设备+'</div></div>'
  if(cd.替代) h += '<div class="d-sec"><div class="d-h">替代方案</div><div class="d-p">'+cd.替代+'</div></div>'
  if(cd.变体) h += '<div class="d-sec"><div class="d-h">变体推荐</div><div class="d-p">'+cd.变体+'</div></div>'
  if(cd.常见问题) h += '<div class="d-sec"><div class="d-h">常见问题</div><div class="d-p">'+cd.常见问题+'</div></div>'
  if(cd.美食故事) h += '<div class="d-sec"><div class="d-h">场景故事</div><div class="d-p">'+cd.美食故事+'</div></div>'
  if(cd.仪式感) { h += '<div class="d-sec"><div class="d-h">仪式感</div><div class="d-p">'; cd.仪式感.forEach(function(s){ h += '▸ '+s+'\n' }); h += '</div></div>' }
  if(cd.建议图片描述) h += '<div class="d-sec"><div class="d-h">图片Prompt</div><div class="d-p" style="font-size:11px;color:#888">'+cd.建议图片描述+'</div></div>'
  h += '<div style="text-align:center;padding:20px 0 40px"><button class="sub-btn" onclick="sub()">订阅解锁完整版</button></div>'
  document.getElementById('db').innerHTML = h
  d.classList.add('active'); document.body.style.overflow='hidden'
}
