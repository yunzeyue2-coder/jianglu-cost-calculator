<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摆摊开店配方库</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-detail: #0f1629;
  --text: #e8e0d4;
  --text-dim: #a89880;
  --gold: #c9a84c;
  --gold-light: #e0c878;
  --gold-dim: #8a7030;
  --accent: #c9a84c;
  --border: #2a2a3e;
  --border-light: #3a3a4e;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 20px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.header .subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* Search */
.search-bar {
  max-width: 500px;
  margin: 16px auto 0;
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

.search-bar input:focus {
  border-color: var(--gold);
  background: rgba(255,255,255,0.08);
}

.search-bar input::placeholder {
  color: var(--text-dim);
}

.search-bar .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 1rem;
}

/* Tabs */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px 20px;
  justify-content: center;
  max-width: 900px;
  margin: 0 auto;
}

.tab {
  padding: 5px 14px;
  border-radius: 16px;
  cursor: pointer;
  font-size: 0.82rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}

.tab:hover {
  border-color: var(--gold-dim);
  color: var(--text);
}

.tab.active {
  background: var(--gold);
  color: #1a1a2e;
  border-color: var(--gold);
  font-weight: 600;
}

/* Counter */
.counter {
  text-align: center;
  padding: 0 20px 8px;
  color: var(--text-dim);
  font-size: 0.82rem;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  padding: 0 20px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--gold-dim);
  opacity: 0;
  transition: opacity 0.2s;
}

.card:hover {
  border-color: var(--gold-dim);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}

.card:hover::before {
  opacity: 1;
}

.card .card-id {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: monospace;
  margin-bottom: 4px;
}

.card .card-name {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
}

.card .card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
}

.card .card-cat {
  color: var(--gold-dim);
  background: rgba(201,168,76,0.1);
  padding: 2px 8px;
  border-radius: 10px;
}

.card .card-status {
  font-size: 0.85rem;
}

.card .card-num {
  color: var(--text-dim);
  font-family: monospace;
  font-size: 0.7rem;
  margin-left: auto;
}

/* Modal / Detail */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  animation: fadeIn 0.2s;
}

.modal-overlay.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal {
  background: var(--bg-detail);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 90%;
  max-width: 700px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  animation: slideUp 0.25s;
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.modal-header .info {
  flex: 1;
}

.modal-header .detail-id {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: monospace;
}

.modal-header .detail-name {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold-light);
  margin: 4px 0;
}

.modal-header .detail-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 0.82rem;
}

.modal-header .detail-cat {
  color: var(--gold-dim);
}

.modal-header .detail-status {
  font-size: 1rem;
}

.modal-header .close-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.modal-header .close-btn:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  font-family: inherit;
  color: var(--text);
}

.modal-body::-webkit-scrollbar {
  width: 6px;
}
.modal-body::-webkit-scrollbar-track {
  background: transparent;
}
.modal-body::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 3px;
}

.modal-footer {
  padding: 12px 24px 20px;
  border-top: 1px solid var(--border);
  text-align: center;
}

.modal-footer .btn-close {
  padding: 8px 32px;
  background: var(--gold);
  color: #1a1a2e;
  border: none;
  border-radius: 20px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.modal-footer .btn-close:hover {
  background: var(--gold-light);
  transform: translateY(-1px);
}

/* Note tag */
.note-tag {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 4px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  grid-column: 1 / -1;
}

.empty .icon {
  font-size: 3rem;
  margin-bottom: 12px;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.3rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; padding: 0 10px 30px; }
  .card { padding: 12px; }
  .card .card-name { font-size: 0.9rem; }
  .tabs { padding: 10px 10px; gap: 4px; }
  .tab { padding: 4px 10px; font-size: 0.75rem; }
  .modal { width: 95%; max-height: 90vh; }
  .modal-body { padding: 16px; }
}
</style>
</head>
<body>

<header class="header">
  <h1>🦞 摆摊开店配方库</h1>
  <div class="subtitle">沧林食品工作站 · 可公开参考配方</div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="搜索配方名称..." autocomplete="off">
  </div>
</header>

<div class="tabs" id="tabs"></div>
<div class="counter" id="counter"></div>
<div class="grid" id="grid"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="info">
        <div class="detail-id" id="detailId"></div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-meta">
          <span class="detail-cat" id="detailCat"></span>
          <span class="detail-tier" id="detailTier"></span>
          <span class="detail-status" id="detailStatus"></span>
          <div class="detail-tags" id="detailTags"></div>
        </div>
        <div class="note-tag" id="detailNote"></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detailContent"></div>
    <div class="modal-footer">
      <button class="btn-close" onclick="closeDetail()">关闭</button>
    </div>
  </div>
</div>

<script>
// ── Data ──
let allRecipes = [];
let currentCat = '全部';
let searchQuery = '';

const CATEGORIES = ['全部','酱料','卤煮肉制品','面食','小吃','饮品/甜品','汤底/卤水','底料','面点','热菜','烧烤','凉菜','炸物','其他'];

// ── Load ──
async function load() {
  try {
    const res = await fetch('recipes-data.json');
    allRecipes = await res.json();
  } catch(e) {
    console.error('Failed to load recipes:', e);
    document.getElementById('grid').innerHTML = '<div class="empty"><div class="icon">📭</div><div>配方数据加载失败</div></div>';
    return;
  }
  render();
}

// ── Render Tabs ──
function renderTabs() {
  const tabEl = document.getElementById('tabs');
  tabEl.innerHTML = CATEGORIES.map(c =>
    `<span class="tab${c === currentCat ? ' active' : ''}" data-cat="${c}">${c}</span>`
  ).join('');

  tabEl.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      currentCat = t.dataset.cat;
      render();
    });
  });
}

// ── Filter ──
function getFiltered() {
  let list = allRecipes;
  if (currentCat !== '全部') {
    list = list.filter(r => r.cat === currentCat);
  }
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    list = list.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.id.toLowerCase().includes(q) ||
      r.content.toLowerCase().includes(q)
    );
  }
  return list;
}

// ── Render Grid ──
function render() {
  renderTabs();
  const filtered = getFiltered();
  document.getElementById('counter').textContent = `共 ${filtered.length} 条配方`;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">🍳</div><div>没有找到匹配的配方</div></div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const statusIcon = { '✅': '✅', '⚠️': '⚠️', '🔴': '🔴' }[r.status] || r.status;
    return `
      <div class="card" data-id="${r.id}" onclick="showDetail('${r.id}')">
        <div class="card-id">${r.id}</div>
        <div class="card-name">${escHtml(r.name)}</div>
        <div class="card-tier">${r.tier||'📘'}</div>
        <div class="card-tags">${(r.tags||[]).map(t => '<span class="t">'+t+'</span>').join('')}</div>
        <div class="card-meta">
          <span class="card-cat">${escHtml(r.cat)}</span>
          <span class="card-status">${statusIcon}</span>
          <span class="card-num">#${r.num}</span>
        </div>
      </div>`;
  }).join('');
}

// ── Detail ──
function showDetail(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('detailId').textContent = `${r.id} · 原编号 #${r.num}`;
  document.getElementById('detailName').textContent = r.name;
  document.getElementById('detailCat').textContent = r.cat;
  document.getElementById('detailTier').textContent = r.tier||'📘';
  document.getElementById('detailStatus').textContent = r.status;
  document.getElementById('detailNote').textContent = r.note || '';
  const tagEl = document.getElementById('detailTags');
  tagEl.innerHTML = (r.tags||[]).map(t => '<span class="tag-badge">'+t+'</span>').join('');
  document.getElementById('detailContent').textContent = r.content;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Scroll modal body to top
  document.querySelector('.modal-body').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ── Search ──
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// Click overlay to close
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeDetail();
});

// ── Helpers ──
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──
load();
</script>

</body>
</html>
