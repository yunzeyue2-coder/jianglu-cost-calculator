<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>咔库 · 探马快报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a140e;
  color:#d4c5a9;
  font-family:"PingFang SC","Noto Serif SC",system-ui,serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
/* 底纹 — 古纸质感 */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(180,120,60,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(180,120,60,0.04) 0%, transparent 60%);
  pointer-events:none;
}

/* 主容器 */
.splash{
  text-align:center;
  padding:40px 24px;
  max-width:400px;
  position:relative;
  z-index:2;
}

/* 印章/火漆 */
.seal{
  width:72px;height:72px;
  border:3px solid #c43a31;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:11px;color:#c43a31;letter-spacing:1px;
  font-weight:600;
  position:relative;
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(196,58,49,0.3);}
  50%{box-shadow:0 0 0 12px rgba(196,58,49,0.05);}
}
.seal::after{
  content:'';
  position:absolute;
  inset:-6px;
  border:1px dashed rgba(196,58,49,0.3);
  border-radius:50%;
  animation:spin 20s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

/* 标题 — 800里加急 */
.title{
  font-size:13px;
  color:#c43a31;
  letter-spacing:6px;
  margin-bottom:6px;
  font-weight:500;
}
.maintitle{
  font-size:40px;
  font-weight:700;
  color:#e8d5b0;
  letter-spacing:12px;
  margin-bottom:8px;
  text-shadow:0 2px 20px rgba(200,160,100,0.15);
  position:relative;
}
.maintitle::after{
  content:'';
  position:absolute;
  bottom:-4px;left:50%;
  transform:translateX(-50%);
  width:40px;height:2px;
  background:#c43a31;
}

/* 马 */
.horse{
  font-size:48px;
  margin:16px 0 12px;
  display:block;
  animation:gallop 1s steps(2) infinite;
}
@keyframes gallop{
  0%{transform:translateX(-4px);}
  100%{transform:translateX(4px);}
}

/* 情报摘要 */
.intel{
  font-size:12px;
  color:#a09078;
  line-height:1.8;
  margin:12px 0 20px;
  padding:0 12px;
  letter-spacing:0.5px;
}
.intel em{
  color:#d4c5a9;
  font-style:normal;
}

/* 驿站印记 */
.stamp{
  font-size:10px;
  color:#6a5a48;
  letter-spacing:3px;
  border-top:1px solid rgba(212,197,169,0.15);
  padding-top:16px;
  margin-top:8px;
  width:100%;
}
.stamp span{
  display:inline-block;
  border:1px solid rgba(212,197,169,0.2);
  padding:2px 10px;
  border-radius:2px;
  margin:0 4px;
  font-size:9px;
}

/* 进度条 — 驿道 */
.trail{
  margin-top:24px;
  width:200px;
  height:2px;
  background:rgba(212,197,169,0.1);
  border-radius:1px;
  position:relative;
  overflow:hidden;
}
.trail-bar{
  height:100%;
  background:#c43a31;
  border-radius:1px;
  width:0%;
  animation:ride 2.2s ease-in-out forwards;
}
@keyframes ride{
  0%{width:0%;}
  80%{width:95%;}
  100%{width:100%;}
}

/* 加急批红 */
.urgent{
  position:absolute;
  top:24px;right:24px;
  font-size:9px;
  color:#c43a31;
  border:1px solid #c43a31;
  padding:2px 8px;
  border-radius:1px;
  letter-spacing:2px;
  opacity:0.7;
}

/* 烽火粒子 — 顶部装饰 */
.flame{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, transparent 0%, #c43a31 20%, #e8a040 50%, #c43a31 80%, transparent 100%);
  opacity:0.4;
  animation:flicker 3s ease-in-out infinite;
}
@keyframes flicker{
  0%,100%{opacity:0.3;}
  50%{opacity:0.6;}
}
</style>
</head>
<body>

<div class="flame"></div>
<div class="urgent">加急 · 快报</div>

<div class="splash">
  <div class="seal">探马</div>
  <div class="title">八百</div>
  <div class="maintitle">里加急</div>
  <span class="horse">🐎</span>
  <div class="intel">
    <em id="flashMsg">铁板虾滑 · 搜索一夜暴涨</em><br>
    市场异动 · 速归
  </div>
  <div class="stamp">
    <span>⚡ 探马快报</span>
    <span>📅 五月廿九</span>
  </div>
  <div class="trail">
    <div class="trail-bar"></div>
  </div>
</div>

<script>
// 闪进情报动态更新
const messages = [
  '铁板虾滑 · 搜索一夜暴涨',
  '手打柠檬茶 · 三周连升',
  '椰子冻 · 夏季窗口已开',
  '日式烧鸟 · 一二线城市起飞',
  '中式糖水 · 国潮回归加速',
];
const el = document.getElementById('flashMsg');
if(el) el.textContent = messages[Math.floor(Math.random()*messages.length)];

// 2.5秒后跳转首页
setTimeout(function(){
  window.location.href = '/jianglu-cost-calculator/card.html';
}, 2500);
</script>
</body>
</html>
